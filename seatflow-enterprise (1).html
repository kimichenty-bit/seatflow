// ── LocalStorage helper ───────────────────────────────────────────────────────
const LS = {
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},

// ══════════════════════════════════════════════════════════════════════════════
// ⚙  CONFIGURATION — 部署前在此填入你的設定

const CONFIG = {
  // 1. Google Cloud Console → OAuth 2.0 Client ID
  CLIENT_ID: '',
  // 2. 限制登入網域，例如 'yourcompany.com'。空白 = 展示模式（任何人可登入）
  ALLOWED_DOMAIN: '',
  // 3. Google Sheet 網址中間那段 ID
  //    例：https://docs.google.com/spreadsheets/d/ [這裡] /edit
  SPREADSHEET_ID: '',
  // 4. 工作表名稱（你的 Sheet tab 名稱）
  SHEET_CAP:   'SeatFlow_Capacity',  // 辦公室容量工作表
  SHEET_TEAMS: 'SeatFlow_Teams',     // 團隊人數工作表
};
const DEMO_MODE = !CONFIG.CLIENT_ID;

// ── Google Sheets loader ──────────────────────────────────────────────────────
async function fetchRange(token, sheetName, range='A1:Z200') {
  const r = encodeURIComponent(`${sheetName}!${range}`);
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${r}`,
    {headers:{Authorization:`Bearer ${token}`}}
  );
  if(!res.ok) throw new Error('Sheets API 錯誤');
  const d = await res.json();
  return d.values || [];
}
// Parse Capacity sheet: office_id | name | capacity | Apr | May...
// Parse Teams sheet:    team_id | dept | office | ft% | ct% | in% | bpo% | Apr | May...
function parseCapacitySheet(rows){
  if(!rows.length)return null;
  const hdr=rows[0];const mi=hdr.indexOf('Apr');
  if(mi<0)return null;
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    id:r[0]||'',name:r[1]||r[0],cap:parseInt(r[2])||0,floors:[],
    _monthly:MONTHS.map((_,i)=>parseInt(r[mi+i])||0),
  }));
}
function parseTeamsSheet(rows){
  if(!rows.length)return null;
  const hdr=rows[0];const mi=hdr.indexOf('Apr');
  if(mi<0)return null;
  return rows.slice(1).filter(r=>r[0]).map((r,i)=>({
    id:r[0]||`t${i}`,dept:r[1]||'',office:r[2]||'',
    bd:{'full-time':parseFloat(r[3])||0,'contractor':parseFloat(r[4])||0,'intern':parseFloat(r[5])||0,'bpo':parseFloat(r[6])||0},
    seats:MONTHS.map((_,i)=>parseInt(r[mi+i])||0),
  }));
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const MONTHS=["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const EMP_TYPES=['full-time','contractor','intern','bpo'];
const EMP_LABELS={'full-time':'Full-time','contractor':'Contractor','intern':'Intern','bpo':'BPO'};
const EMP_CHIP={
  'full-time':{bg:'#dbeafe',txt:'#1d4ed8'},
  'contractor':{bg:'#cffafe',txt:'#0e7490'},
  'intern':{bg:'#d1fae5',txt:'#065f46'},
  'bpo':{bg:'#ede9fe',txt:'#5b21b6'},
};
const DEFAULT_WEIGHTS={'full-time':1.0,'contractor':0.8,'intern':0.5,'bpo':0.5};

const TEAMS=[

  {id:'t12',dept:'SPX CS',      office:'TNH',   seats:[181,208,210,214,217,217,224,234,244],bd:{'full-time':.20,'contractor':.10,'intern':.05,'bpo':.65}},
  {id:'t13',dept:'SPX',         office:'UDN',   seats:[139,139,136,131,127,127,212,224,236],bd:{'full-time':.60,'contractor':.25,'intern':.05,'bpo':.10}},
  {id:'t14',dept:'SkyCo',       office:'SkyCo', seats:[0,66,66,71,78,84,0,0,0],            bd:{'full-time':.70,'contractor':.25,'intern':.05,'bpo':0}},
];
const INIT_USERS=[
  {id:'u1',name:'Angel Chen',    email:'angel@corp.com',  role:'admin',  ini:'AC',depts:[],active:true},
  {id:'u2',name:'Joanne Wu',     email:'joanne@corp.com', role:'manager',ini:'JW',depts:['OPS','People-HOS'],active:true},
  {id:'u3',name:'Avarie Johnson',email:'avarie@corp.com', role:'viewer', ini:'AJ',depts:['SPX CS','SPX'],active:true},

];
const PERMS={
  admin:  new Set(['view','edit','sync','manage-users','scenario','weight-edit','export']),
  manager:new Set(['view','edit','scenario','weight-view']),
  viewer: new Set(['view']),
};
const ROLE_META={

// ── WEIGHT ENGINE ─────────────────────────────────────────────────────────────
const pct=(u,c)=>c>0?Math.round(u/c*100):0;
const statusOf=p=>p>=95?'danger':p>=80?'warn':p>0?'ok':'empty';
const SC={
  danger:{bg:'#fef2f2',txt:'#b91c1c',bar:'#ef4444',border:'#fecaca'},
  warn:  {bg:'#fffbeb',txt:'#92400e',bar:'#f59e0b',border:'#fde68a'},
  ok:    {bg:'#f0fdf4',txt:'#166534',bar:'#22c55e',border:'#bbf7d0'},
  empty: {bg:'#f9fafb',txt:'#9ca3af',bar:'#e5e7eb',border:'#f3f4f6'},
};
function weightedFactor(team,gw,deptOv){
  const w={...gw,...(deptOv?.[team.dept]||{})};
  return EMP_TYPES.reduce((s,t)=>s+(team.bd[t]||0)*(w[t]??1),0);
}
// type-aware: each entry has { team, total, ts:{ft,ct,intern,bpo}, inBy:{}, outBy:{} }
function getEffectiveTeams(officeId,mi,moves){
  const r={};
  TEAMS.forEach(t=>{
    if(t.office===officeId){
      const total=t.seats[mi]||0;
      const ts={};EMP_TYPES.forEach(et=>ts[et]=Math.round(total*(t.bd[et]||0)));
      r[t.id]={team:t,total,ts,inBy:{},outBy:{}};
    }
  });
  (moves||[]).forEach(mv=>{
    if(!mv.months.includes(mi))return;
    const team=TEAMS.find(t=>t.id===mv.teamId);if(!team)return;
    const isAll=!mv.empType||mv.empType==='all';
    // seats going OUT
    if(team.office===officeId&&r[team.id]){
      if(isAll){
        r[team.id].total=Math.max(0,r[team.id].total-mv.seats);
        EMP_TYPES.forEach(et=>{
          const n=Math.round(mv.seats*(team.bd[et]||0));
          r[team.id].ts[et]=Math.max(0,(r[team.id].ts[et]||0)-n);
          r[team.id].outBy[et]=(r[team.id].outBy[et]||0)+n;
        });
      }else{
        r[team.id].ts[mv.empType]=Math.max(0,(r[team.id].ts[mv.empType]||0)-mv.seats);
        r[team.id].total=Math.max(0,r[team.id].total-mv.seats);
        r[team.id].outBy[mv.empType]=(r[team.id].outBy[mv.empType]||0)+mv.seats;
      }
    }
    // seats coming IN
    if(mv.toOffice===officeId){
      if(!r[team.id]){const ts={};EMP_TYPES.forEach(et=>ts[et]=0);r[team.id]={team,total:0,ts,inBy:{},outBy:{}};}
      if(isAll){
        r[team.id].total+=mv.seats;
        EMP_TYPES.forEach(et=>{
          const n=Math.round(mv.seats*(team.bd[et]||0));
          r[team.id].ts[et]=(r[team.id].ts[et]||0)+n;
          r[team.id].inBy[et]=(r[team.id].inBy[et]||0)+n;
        });
      }else{
        r[team.id].ts[mv.empType]=(r[team.id].ts[mv.empType]||0)+mv.seats;
        r[team.id].total+=mv.seats;
        r[team.id].inBy[mv.empType]=(r[team.id].inBy[mv.empType]||0)+mv.seats;
      }
    }
  });
  return Object.values(r);
}
function calcOfficeLoad(officeId,mi,moves,gw,deptOv){
  let actual=0,weighted=0;
  getEffectiveTeams(officeId,mi,moves).forEach(({team,total,ts})=>{
    if(!team||total<=0)return;
    actual+=total;
    const w={...gw,...(deptOv?.[team.dept]||{})};
    EMP_TYPES.forEach(et=>{weighted+=Math.round((ts[et]||0)*(w[et]??1));});
  });
  return{actual,weighted};
}

// Per-team remaining counts after moves applied to its source office
function getTeamRemainingByType(team,mi,moves){
  const total=team.seats[mi]||0;
  const ts={};
  EMP_TYPES.forEach(et=>ts[et]=Math.round(total*(team.bd[et]||0)));
  (moves||[]).forEach(mv=>{
    if(mv.teamId!==team.id)return;
    if(!mv.months.includes(mi))return;
    const isAll=!mv.empType||mv.empType==='all';
    if(isAll){EMP_TYPES.forEach(et=>{ts[et]=Math.max(0,ts[et]-Math.round(mv.seats*(team.bd[et]||0)));});}
    else{ts[mv.empType]=Math.max(0,ts[mv.empType]-mv.seats);}
  });
  return ts;
}

// ── useAccessControl ──────────────────────────────────────────────────────────
function useAccessControl(user){
  const can=useCallback(p=>user?PERMS[user.role]?.has(p)??false:false,[user]);
  const canDept=useCallback(d=>{
    if(!user)return false;
    if(user.role==='admin')return true;
    if(!user.depts||user.depts.length===0)return user.role!=='viewer';
    return user.depts.includes(d);
  },[user]);
  return{can,canDept};
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({users,onLogin}){
  const [step,setStep]=useState(0);
  const [picked,setPicked]=useState(null);
  const [loading,setLoading]=useState(false);
  const [gError,setGError]=useState('');
  const gBtnRef=useRef(null);

  // Real OAuth mode: render Google button
  useEffect(()=>{
    if(DEMO_MODE||!gBtnRef.current)return;
    const init=()=>{
      if(!window.google?.accounts)return setTimeout(init,200);
      window.google.accounts.id.initialize({
        client_id:CONFIG.CLIENT_ID,
        ...(CONFIG.ALLOWED_DOMAIN?{hosted_domain:CONFIG.ALLOWED_DOMAIN}:{}),
        callback:(res)=>{
          try{
            const p=JSON.parse(atob(res.credential.split('.')[1]));
            if(CONFIG.ALLOWED_DOMAIN&&p.hd!==CONFIG.ALLOWED_DOMAIN){
              setGError(`僅限 @${CONFIG.ALLOWED_DOMAIN} 網域帳號`);return;
            }
            const ini=(p.name||p.email).split(' ').map(s=>s[0]||'').join('').toUpperCase().slice(0,2)||'?';
            const u={id:p.sub,name:p.name||p.email,email:p.email,ini,role:'viewer',depts:[],active:true,picture:p.picture||''};
            // Check if user already exists in system (to preserve role)
            const saved=LS.get('sf-users')||[];
            const existing=saved.find(x=>x.email===p.email);
            onLogin(existing?{...existing}:{...u});
          }catch(e){setGError('登入失敗，請重試');}
        },
      });
      window.google.accounts.id.renderButton(gBtnRef.current,{
        theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:336,locale:'zh-TW',
      });
    };
    init();
  },[gBtnRef.current]);

  // ── Real OAuth UI ──
  if(!DEMO_MODE) return(
    <div style={{minHeight:'100vh',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:400,textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:24,color:'#111827',marginBottom:4,letterSpacing:'-1px'}}>
          SeatFlow <span style={{fontSize:11,background:'#1d4ed8',color:'#fff',borderRadius:4,padding:'2px 7px',fontWeight:700}}>Enterprise</span>
        </div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:28}}>辦公室座位決策平台</div>
        <div className="card" style={{padding:'28px 28px 24px'}}>
          <div style={{fontSize:12,color:'#6b7280',marginBottom:20}}>
            {CONFIG.ALLOWED_DOMAIN
              ?<>僅限 <strong>@{CONFIG.ALLOWED_DOMAIN}</strong> 企業帳號登入</>
              :'使用 Google 帳號登入'}
          </div>
          <div ref={gBtnRef} style={{display:'flex',justifyContent:'center',minHeight:44}}/>
          {gError&&<div style={{marginTop:12,color:'#dc2626',fontSize:12,padding:'8px 12px',background:'#fef2f2',borderRadius:6}}>{gError}</div>}
          <div style={{marginTop:16,fontSize:10,color:'#9ca3af',lineHeight:1.6}}>
            登入即代表同意記錄操作紀錄於稽核日誌
          </div>
        </div>
      </div>
    </div>
  );

  // ── Demo mode UI (original) ──
  const pick=u=>{setPicked(u);setStep(1);};
  return(
    <div style={{minHeight:'100vh',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:420,textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:26,color:'#111827',marginBottom:3,letterSpacing:'-1px'}}>SeatFlow <span style={{fontSize:12,background:'#f59e0b',color:'#fff',borderRadius:4,padding:'2px 7px',letterSpacing:0,fontWeight:700,verticalAlign:'middle'}}>Demo</span></div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:28}}>展示模式（未設定 CLIENT_ID）</div>
        {step===0&&(
          <div className="card fu" style={{padding:28}}>
            <div style={{fontSize:12,fontWeight:600,color:'#374151',marginBottom:4}}>選擇測試帳號</div>
            <div style={{fontSize:11,color:'#9ca3af',marginBottom:18}}>部署後請在 CONFIG 填入 CLIENT_ID 啟用真實 Google 登入</div>
            {users.filter(u=>u.active).map(u=>(
              <button key={u.id} onClick={()=>pick(u)}
                style={{width:'100%',padding:'11px 14px',border:'1px solid #e5e7eb',borderRadius:8,background:'#fff',cursor:'pointer',marginBottom:8,display:'flex',alignItems:'center',gap:12,transition:'border .15s',fontFamily:'inherit'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='#1d4ed8'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#e5e7eb'}>
                <Avatar ini={u.ini}/><div style={{textAlign:'left'}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#111827'}}>{u.name}</div>
                  <div style={{fontSize:11,color:'#6b7280'}}>{u.email} · <span style={{color:u.role==='viewer'?'#6b7280':ROLE_META[u.role].bg}}>{ROLE_META[u.role].label}</span></div>
                </div>
              </button>
            ))}
          </div>
        )}
        {step===1&&(
          <div className="card fu" style={{padding:28}}>
            <Avatar ini={picked?.ini||'?'} size={44} bg='#1d4ed8'/>
            <div style={{marginTop:12,fontWeight:700,fontSize:14,marginBottom:6}}>以 {picked?.name} 登入</div>
            <button onClick={()=>{setLoading(true);setTimeout(()=>onLogin(picked),700);}} disabled={loading}
              style={{width:'100%',padding:11,background:'#1d4ed8',color:'#fff',border:'none',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'inherit',marginTop:14}}>
              {loading?'登入中...':'確認登入'}
            </button>
            <button onClick={()=>setStep(0)} style={{marginTop:10,background:'none',border:'none',color:'#6b7280',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>← 返回</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({moves,gw,deptOv,activeScenario}){
  const [expandedOffices,setExpandedOffices]=useState({});
  const toggle=id=>setExpandedOffices(p=>({...p,[id]:!p[id]}));
  const rows=useMemo(()=>{
    const list=[];
    OFFICES.forEach(o=>{
      list.push(o);
      if(expandedOffices[o.id]&&o.floors?.length) o.floors.forEach(f=>list.push({...f,isFloor:true}));
    });
    return list;
  },[expandedOffices]);
  const totalCap=OFFICES.reduce((s,o)=>s+o.cap+(o.floors||[]).reduce((fs,f)=>fs+f.cap,0),0);

  return(
    <div className="fu">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">座位使用率總覽</div>
          <div className="ssub">{activeScenario?<span style={{color:'#d97706',fontWeight:600}}>⚡ 情境模式：{activeScenario.name}（模擬數據）</span>:'Apr–Dec 2026 · 實際人數 & 權重負載'}</div>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {EMP_TYPES.map(t=><span key={t} className="pill" style={{background:EMP_CHIP[t].bg,color:EMP_CHIP[t].txt}}>{EMP_LABELS[t]}</span>)}
          </div>
          <Legend/>
        </div>
      </div>
      {/* KPI Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
        {OFFICES.map(o=>{
          const loads=MONTHS.map((_,mi)=>calcOfficeLoad(o.id,mi,moves,gw,deptOv));
          const maxW=Math.max(...loads.map(l=>pct(l.weighted,o.cap)));
          const maxA=Math.max(...loads.map(l=>pct(l.actual,o.cap)));
          const s=statusOf(maxW);
          return(
            <div key={o.id} className="card" style={{padding:'12px 14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#6b7280',marginBottom:4}}>{o.name} · {o.cap} seats</div>
              <div style={{fontSize:20,fontWeight:800,color:SC[s].txt,lineHeight:1}}>{maxW}%</div>
              <div style={{fontSize:9,color:'#9ca3af',marginTop:2}}>權重負載 peak · 實際 {maxA}%</div>
              <div style={{height:3,background:'#f1f5f9',borderRadius:2,marginTop:6}}>
                <div style={{height:3,background:SC[s].bar,borderRadius:2,width:Math.min(maxW,100)+'%'}}/>
              </div>
            </div>
          );
        })}
      </div>
      {/* Heatmap */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="tbl" style={{minWidth:1000}}>
            <thead>
              <tr>
                <th style={{minWidth:155}}>辦公室</th>
                <th style={{width:60,textAlign:'right'}}>容量</th>
                {MONTHS.map((m,mi)=>(
                  <th key={mi} style={{textAlign:'center',minWidth:88}}>
                    {m}'26<div style={{fontWeight:400,fontSize:9,color:'#9ca3af',marginTop:1}}>實人 / 負載</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(row=>{
                const hasF=!row.isFloor&&row.floors?.length>0;
                return(
                  <tr key={row.id} style={{background:row.isFloor?'#fafafa':'#fff'}}>
                    <td style={{paddingLeft:row.isFloor?30:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        {row.isFloor&&<span style={{color:'#cbd5e1',fontSize:11,marginLeft:-12}}>└</span>}
                        {hasF&&<button onClick={()=>toggle(row.id)} style={{width:17,height:17,border:'1.5px solid #d1d5db',borderRadius:4,background:'transparent',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b7280',fontFamily:'inherit'}}>{expandedOffices[row.id]?'−':'+'}</button>}
                        <span style={{fontWeight:row.isFloor?400:700,fontSize:12}}>{row.name}</span>
                        {hasF&&<span style={{fontSize:9,color:'#9ca3af'}}>({row.floors.length}F)</span>}
                      </div>
                    </td>
                    <td style={{textAlign:'right',color:'#6b7280',fontWeight:500,fontSize:12}}>{row.cap}</td>
                    {MONTHS.map((_,mi)=>{
                      const {actual,weighted}=calcOfficeLoad(row.id,mi,moves,gw,deptOv);
                      const baseLoad=calcOfficeLoad(row.id,mi,[],gw,deptOv);
                      const wPct=pct(weighted,row.cap);
                      const aPct=pct(actual,row.cap);
                      const s=statusOf(wPct);
                      const c=SC[s];
                      const changed=activeScenario&&(actual!==baseLoad.actual);
                      if(row.cap===0&&actual===0)return <td key={mi} style={{textAlign:'center',color:'#e5e7eb',fontSize:11}}>—</td>;
                      return(
                        <td key={mi} style={{padding:4,textAlign:'center'}}>
                          <div style={{background:c.bg,borderRadius:6,padding:'5px 2px',border:`1.5px solid ${changed?'#f59e0b':'transparent'}`,position:'relative',transition:'all .2s'}}>
                            <div style={{fontSize:11,fontWeight:700,color:c.txt,lineHeight:1.2}}>{actual>0?actual:'—'}</div>
                            {actual>0&&<div style={{fontSize:9,color:c.txt,opacity:.8,marginTop:1,lineHeight:1}}>↓{weighted} ({wPct}%)</div>}
                            {wPct>=95&&<div style={{position:'absolute',top:-5,left:'50%',transform:'translateX(-50%)',fontSize:9,background:'#ef4444',color:'#fff',borderRadius:3,padding:'1px 4px',whiteSpace:'nowrap'}}>⚠超載</div>}
                            {changed&&<div style={{position:'absolute',top:-4,right:-4,width:7,height:7,borderRadius:'50%',background:'#f59e0b',border:'2px solid #fff'}}/>}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
              {/* Totals */}
              <tr style={{background:'#f8fafc',borderTop:'2px solid #e5e7eb'}}>
                <td style={{fontWeight:700,fontSize:12}}>TOTAL</td>
                <td style={{textAlign:'right',fontWeight:700,fontSize:12}}>{totalCap}</td>
                {MONTHS.map((_,mi)=>{
                  const tot=OFFICES.reduce((acc,o)=>{const l=calcOfficeLoad(o.id,mi,moves,gw,deptOv);return{actual:acc.actual+l.actual,weighted:acc.weighted+l.weighted};},{actual:0,weighted:0});
                  const wp=pct(tot.weighted,totalCap);const s=statusOf(wp);
                  return(
                    <td key={mi} style={{padding:4,textAlign:'center'}}>
                      <div style={{background:SC[s].bg,borderRadius:6,padding:'5px 2px'}}>
                        <div style={{fontSize:11,fontWeight:700,color:SC[s].txt}}>{tot.actual}</div>
                        <div style={{fontSize:9,color:SC[s].txt,opacity:.8}}>↓{tot.weighted} ({wp}%)</div>
                      </div>
                    </td>
                  );
                })}
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{padding:'8px 16px',borderTop:'1px solid #f1f5f9',display:'flex',gap:16,fontSize:10,color:'#9ca3af'}}>
          <span>上方數字 = 實際人頭數</span>
          <span>↓下方數字 = 權重計算後負載 (%) · 超過 95% 顯示警示</span>
        </div>
      </div>
    </div>
  );
}

// ── SCENARIO BUILDER v3 ───────────────────────────────────────────────────────
function ScenarioBuilder({scenarios,setScenarios,activeScId,setActiveScId,gw,setGw,deptOv,showToast,logAction,user}){
  const {can}=useAccessControl(user);
  const canEditW=can('weight-edit');
  const [viewMonth,setViewMonth]=useState(0);
  const [moveMonths,setMoveMonths]=useState([0,1,2]);
  const [expandedTeams,setExpandedTeams]=useState({});
  const [dragging,setDragging]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const [pendingMove,setPendingMove]=useState(null);
  const [moveSeats,setMoveSeats]=useState('');
  const [applyModal,setApplyModal]=useState(false);
  const [scName,setScName]=useState('');
  const [addingNew,setAddingNew]=useState(false);
  const [showWeightPanel,setShowWeightPanel]=useState(false);

  const activeSc=scenarios.find(s=>s.id===activeScId);
  useEffect(()=>{if(activeSc)setScName(activeSc.name);},[activeScId]);

  // Canvas: effective team data for the view month
  const canvasData=useMemo(()=>{
    const res={};
    ALL_OFFICES.forEach(o=>{
      res[o.id]=getEffectiveTeams(o.id,viewMonth,activeSc?.moves||[])
        .filter(r=>r.total>0||Object.values(r.inBy).some(v=>v>0));
    });
    return res;
  },[activeSc,viewMonth]);

  // Comparison data: remaining seats (cap - actual) per office per month
  const compData=useMemo(()=>OFFICES.map(o=>({
    office:o,
    months:MONTHS.map((_,mi)=>{
      const base=calcOfficeLoad(o.id,mi,[],gw,deptOv);
      const sc=calcOfficeLoad(o.id,mi,activeSc?.moves||[],gw,deptOv);
      return{
        baseActual:base.actual, baseRemain:o.cap-base.actual,
        scActual:sc.actual,    scRemain:o.cap-sc.actual,
        delta:sc.actual-base.actual,
      };
    }),
  })),[activeSc,gw,deptOv]);

  // Per-move per-month warning: detect if move exceeds available for any month
  const getMoveWarnings=(teamId,empType,seats)=>{
    const team=TEAMS.find(t=>t.id===teamId);if(!team)return[];
    return moveMonths.map(mi=>{
      const total=team.seats[mi]||0;
      const available=empType==='all'?total:Math.round(total*(team.bd[empType]||0));
      return{mi,available,requested:seats,ok:seats<=available};
    });
  };

  const handleDragStart=(e,teamId,fromOffice,empType='all')=>{
    if(!canDragDrop){showToast(activeSc?'情境已鎖定，請先解鎖再拖曳':'請先選擇或建立一個情境','error');e.preventDefault();return;}
    e.stopPropagation();
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('teamId',teamId);
    e.dataTransfer.setData('fromOffice',fromOffice);
    e.dataTransfer.setData('empType',empType);
    setDragging({teamId,empType});
  };
  const handleDrop=(e,toOfficeId)=>{
    e.preventDefault();
    const teamId=e.dataTransfer.getData('teamId');
    const fromOffice=e.dataTransfer.getData('fromOffice');
    const empType=e.dataTransfer.getData('empType')||'all';
    setDragging(null);setDropTarget(null);
    if(!teamId||fromOffice===toOfficeId)return;
    const team=TEAMS.find(t=>t.id===teamId);if(!team)return;
    const total=team.seats[viewMonth]||0;
    const def=empType==='all'?total:Math.round(total*(team.bd[empType]||0));
    setMoveSeats(String(def));
    setPendingMove({teamId,fromOffice,toOffice:toOfficeId,empType});
  };
  const confirmMove=()=>{
    if(!pendingMove)return;
    const seats=parseInt(moveSeats)||0;
    if(seats<=0){showToast('人數必須 > 0','error');return;}
    const move={id:`m${Date.now()}`,teamId:pendingMove.teamId,empType:pendingMove.empType,toOffice:pendingMove.toOffice,months:[...moveMonths],seats};
    const updated=scenarios.map(s=>s.id===activeScId?{...s,moves:[...s.moves,move]}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    const team=TEAMS.find(t=>t.id===pendingMove.teamId);
    const tl=pendingMove.empType==='all'?'全類型':EMP_LABELS[pendingMove.empType];
    showToast(`✓ ${team?.dept}（${tl}）${seats}人 → ${pendingMove.toOffice}`);
    logAction(`挪移：${team?.dept} ${tl} ${seats}人 → ${pendingMove.toOffice}`);
    setPendingMove(null);setMoveSeats('');
  };
  const deleteMove=mvId=>{
    const updated=scenarios.map(s=>s.id===activeScId?{...s,moves:s.moves.filter(m=>m.id!==mvId)}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
  };
  const deleteScenario=id=>{
    const updated=scenarios.filter(s=>s.id!==id);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    if(activeScId===id)setActiveScId(null);
    showToast('情境已刪除');
  };
  const addScenario=()=>{
    if(!scName.trim())return;
    const id=`sc${Date.now()}`;
    const sc={id,name:scName.trim(),createdBy:user.ini,createdAt:new Date().toISOString().slice(0,10),moves:[],locked:false};
    const updated=[...scenarios,sc];
    setScenarios(updated);LS.set('sf-scenarios',updated);
    setActiveScId(id);setAddingNew(false);setScName('');
    logAction(`建立情境：${sc.name}`);
  };
  const lockScenario=()=>{
    if(!activeSc)return;
    const updated=scenarios.map(s=>s.id===activeScId?{...s,locked:true}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    showToast('✓ 情境已暫存鎖定，下次進入為唯讀狀態');
    logAction(`暫存鎖定情境：${activeSc.name}`);
  };
  const unlockScenario=()=>{
    const updated=scenarios.map(s=>s.id===activeScId?{...s,locked:false}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    showToast('🔓 情境已解鎖，可進行編輯');
  };
  const applyBaseline=()=>{
    if(!activeSc)return;
    // Generate a human-readable summary for copy-paste / record
    const lines=[`【情境採用確認】${activeSc.name}`,`採用日期：${new Date().toLocaleDateString('zh-TW')}`,`---`];
    activeSc.moves.forEach(mv=>{
      const team=TEAMS.find(t=>t.id===mv.teamId);
      const tl=mv.empType==='all'?'全員工':EMP_LABELS[mv.empType];
      lines.push(`• ${team?.dept} (${tl}) ${mv.seats}人  ${team?.office} → ${mv.toOffice}  月份：${mv.months.map(mi=>MONTHS[mi]).join('、')}`);
    });
    lines.push(`---`);
    lines.push(`請依上述變更更新 Google Sheet 資料後重新同步`);
    const text=lines.join('\n');
    try{navigator.clipboard.writeText(text);showToast('✓ 採用摘要已複製到剪貼簿');}
    catch{showToast('請手動複製彈窗內的摘要');}
    logAction(`採用情境：${activeSc.name}`);
    setApplyModal(false);
  };
  const toggleMonth=mi=>setMoveMonths(p=>p.includes(mi)?p.filter(m=>m!==mi):[...p,mi]);
  const toggleTeam=id=>setExpandedTeams(p=>({...p,[id]:!p[id]}));
  const isDraggingCard=(teamId,empType)=>dragging?.teamId===teamId&&dragging?.empType===empType;
  const officeNameById=id=>{const o=ALL_OFFICES.find(x=>x.id===id);return o?.name||id;};
  const tLabel=et=>et==='all'?'全員工':EMP_LABELS[et];
  const tChip=et=>et==='all'?{bg:'#f3f4f6',txt:'#374151'}:EMP_CHIP[et];
  const remainColor=r=>r<0?'#dc2626':r<20?'#d97706':r<60?'#059669':'#374151';
  const remainBg=r=>r<0?'#fef2f2':r<20?'#fffbeb':r<60?'#f0fdf4':'#f9fafb';
  const isLocked=activeSc?.locked;
  const canDragDrop=activeSc&&!isLocked;

  return(
    <div className="fu">
      {/* ── Top: scenario controls ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">情境模擬工作台</div>
          <div className="ssub">
            {isLocked
              ? <span style={{color:'#d97706'}}>🔒 此情境已暫存鎖定（唯讀），點「解鎖」後才能編輯</span>
              : '① 選情境 → ② 展開左側類型列 → ③ 拖曳到目標辦公室 → ④ 設定人數與月份'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {activeSc&&!isLocked&&(
            <button className="btn btn-ghost btn-sm" onClick={lockScenario}
              style={{borderColor:'#d97706',color:'#d97706'}}>
              💾 暫存鎖定
            </button>
          )}
          {activeSc&&isLocked&&(
            <button className="btn btn-ghost btn-sm" onClick={unlockScenario}
              style={{borderColor:'#374151',color:'#374151'}}>
              🔓 解鎖編輯
            </button>
          )}
          {activeSc&&<button className="btn btn-green btn-sm" onClick={()=>setApplyModal(true)}>✓ 確認採用此情境</button>}
        </div>
      </div>

      {/* Scenario selector bar */}
      <div className="card" style={{padding:'10px 14px',marginBottom:12,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:'#374151',flexShrink:0}}>情境：</span>
        {scenarios.map(sc=>(
          <div key={sc.id} style={{display:'flex',alignItems:'center',gap:2}}>
            <button onClick={()=>setActiveScId(activeScId===sc.id?null:sc.id)}
              style={{padding:'4px 11px',borderRadius:'20px 0 0 20px',border:`1.5px solid ${activeScId===sc.id?'#1d4ed8':'#d1d5db'}`,borderRight:'none',background:activeScId===sc.id?'#eff6ff':'#fff',color:activeScId===sc.id?'#1d4ed8':'#374151',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}}>
              {sc.locked&&<span style={{fontSize:10}}>🔒</span>}
              {sc.name} ({sc.moves.length})
            </button>
            <button onClick={()=>!sc.locked&&deleteScenario(sc.id)}
              style={{padding:'4px 8px',borderRadius:'0 20px 20px 0',border:`1.5px solid ${activeScId===sc.id?'#1d4ed8':'#d1d5db'}`,background:activeScId===sc.id?'#eff6ff':'#fff',color:sc.locked?'#e5e7eb':'#9ca3af',cursor:sc.locked?'not-allowed':'pointer',fontSize:12,fontFamily:'inherit',lineHeight:1}}
              title={sc.locked?'請先解鎖才能刪除':'刪除此情境'}>×</button>
          </div>
        ))}
        {addingNew?(
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input className="inp" style={{width:130,padding:'5px 9px'}} value={scName} onChange={e=>setScName(e.target.value)} placeholder="情境名稱" onKeyDown={e=>e.key==='Enter'&&addScenario()} autoFocus/>
            <button className="btn btn-primary btn-sm" onClick={addScenario}>建立</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setAddingNew(false)}>取消</button>
          </div>
        ):(
          <button className="btn btn-ghost btn-sm" onClick={()=>{setAddingNew(true);setScName('');}}>+ 新增情境</button>
        )}
      </div>

      {/* ── Remaining Capacity Table (ALWAYS VISIBLE) ── */}
      <div className="card" style={{marginBottom:12,overflow:'hidden'}}>
        <div style={{padding:'10px 16px',borderBottom:'1px solid #e5e7eb',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <span style={{fontWeight:700,fontSize:12}}>各辦公室剩餘座位</span>
            <span style={{fontSize:11,color:'#6b7280',marginLeft:8}}>
              {activeSc?<span style={{color:'#d97706'}}>⚡ 左=基準 / 右=模擬情境（橘色=差異）</span>:'容量 − 已佔用人數（實際人頭）'}
            </span>
          </div>
          <div style={{display:'flex',gap:10,fontSize:10,color:'#9ca3af'}}>
            <span style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:4,padding:'1px 6px',color:'#b91c1c'}}>＜0 已超</span>
            <span style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:4,padding:'1px 6px',color:'#92400e'}}>0–19</span>
            <span style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:4,padding:'1px 6px',color:'#166534'}}>20–59</span>
            <span style={{background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:4,padding:'1px 6px',color:'#374151'}}>≥60</span>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl" style={{minWidth:900}}>
            <thead>
              <tr>
                <th style={{minWidth:80}}>辦公室</th>
                <th style={{width:55,textAlign:'right'}}>容量</th>
                {MONTHS.map((m,mi)=>(
                  <th key={mi} style={{textAlign:'center',padding:'6px 3px',minWidth:activeSc?96:62}}>
                    {m}'26
                    {activeSc&&<div style={{display:'flex',gap:2,justifyContent:'center',marginTop:2,fontSize:8,color:'#9ca3af'}}>
                      <span>基準</span><span>情境</span>
                    </div>}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {compData.map(({office:o,months})=>(
                <tr key={o.id}>
                  <td style={{fontWeight:700,fontSize:12}}>{o.name}</td>
                  <td style={{textAlign:'right',color:'#6b7280',fontSize:11}}>{o.cap}</td>
                  {months.map(({baseActual,baseRemain,scActual,scRemain,delta},mi)=>{
                    const showSc=!!activeSc;
                    const hasDelta=showSc&&delta!==0;
                    return(
                      <td key={mi} style={{padding:3,textAlign:'center'}}>
                        {showSc?(
                          <div style={{display:'flex',gap:2,justifyContent:'center'}}>
                            {/* Baseline */}
                            <div style={{background:remainBg(baseRemain),borderRadius:4,padding:'4px 5px',minWidth:42}}>
                              <div style={{fontSize:11,fontWeight:700,color:remainColor(baseRemain)}}>{baseRemain}</div>
                              <div style={{fontSize:8,color:'#9ca3af',lineHeight:1}}>{baseActual}人</div>
                            </div>
                            {/* Scenario */}
                            <div style={{background:remainBg(scRemain),borderRadius:4,padding:'4px 5px',minWidth:42,
                              border:hasDelta?`1.5px solid ${delta>0?'#fecaca':'#bbf7d0'}`:'1px solid transparent'}}>
                              <div style={{fontSize:11,fontWeight:700,color:remainColor(scRemain)}}>{scRemain}</div>
                              {hasDelta&&<div style={{fontSize:8,color:delta>0?'#dc2626':'#059669',fontWeight:700,lineHeight:1}}>{delta>0?'▲':delta<0?'▼':''}{Math.abs(delta)}</div>}
                            </div>
                          </div>
                        ):(
                          <div style={{background:remainBg(baseRemain),borderRadius:4,padding:'4px 5px'}}>
                            <div style={{fontSize:12,fontWeight:700,color:remainColor(baseRemain)}}>{baseRemain}</div>
                            <div style={{fontSize:9,color:'#9ca3af'}}>{baseActual}人</div>
                          </div>
                        )}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Month controls ── */}
      <div className="card" style={{padding:'10px 14px',marginBottom:12,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#374151',flexShrink:0}}>畫布顯示月份：</span>
          {MONTHS.map((m,mi)=>(
            <button key={mi} onClick={()=>setViewMonth(mi)}
              style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${viewMonth===mi?'#374151':'#d1d5db'}`,background:viewMonth===mi?'#111827':'#fff',color:viewMonth===mi?'#fff':'#374151',cursor:'pointer',fontSize:10,fontWeight:600,fontFamily:'inherit'}}>
              {m}
            </button>
          ))}
        </div>
        <div style={{width:1,height:24,background:'#e5e7eb'}}/>
        <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#1d4ed8',flexShrink:0}}>挪移套用月份：</span>
          {MONTHS.map((m,mi)=>{const s=moveMonths.includes(mi);return(
            <span key={mi} className="chip" onClick={()=>toggleMonth(mi)}
              style={{borderColor:s?'#1d4ed8':'#d1d5db',background:s?'#eff6ff':'#fff',color:s?'#1d4ed8':'#6b7280',fontSize:10}}>
              {m}
            </span>
          );})}
          <span style={{fontSize:10,color:'#9ca3af'}}>（拖曳確認後生效的月份）</span>
        </div>
      </div>

      {/* ── Main Canvas ── */}
      <div style={{display:'flex',gap:12,alignItems:'flex-start',minHeight:350}}>

        {/* LEFT: Team type palette */}
        <div style={{width:248,flexShrink:0,maxHeight:'72vh',overflowY:'auto',paddingRight:2}}>
          <div style={{padding:'7px 10px',background:'#eff6ff',borderRadius:8,border:'1px solid #bfdbfe',marginBottom:10,fontSize:10,color:'#1e40af',lineHeight:1.8}}>
            <strong>操作：</strong><br/>
            1. 選/建立情境<br/>
            2. 點 <strong>▼ 展開</strong> 查看各類型人數<br/>
            3. <strong>拖曳類型列</strong>到右側辦公室<br/>
            4. 設定人數 + 確認月份
          </div>
          {OFFICES.map(o=>{
            const teamsHere=TEAMS.filter(t=>t.office===o.id&&(t.seats[viewMonth]||0)>0);
            if(!teamsHere.length)return null;
            return(
              <div key={o.id} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:'#9ca3af',marginBottom:4,textTransform:'uppercase',display:'flex',alignItems:'center',gap:6}}>
                  <div style={{flex:1,height:1,background:'#e5e7eb'}}/>{o.name}<div style={{flex:1,height:1,background:'#e5e7eb'}}/>
                </div>
                {teamsHere.map(team=>{
                  const total=team.seats[viewMonth]||0;
                  const isExp=expandedTeams[team.id];
                  const remaining=activeSc?getTeamRemainingByType(team,viewMonth,activeSc.moves):{};
                  const remTotal=activeSc?EMP_TYPES.reduce((s,et)=>s+(remaining[et]||0),0):total;
                  const hasMoved=activeSc&&remTotal<total;
                  return(
                    <div key={team.id} style={{marginBottom:6,border:`1.5px solid ${hasMoved?'#fed7aa':'#e5e7eb'}`,borderRadius:9,overflow:'hidden',background:'#fff',boxShadow:'0 1px 2px rgba(0,0,0,.04)'}}>
                      {/* Header – drag all */}
                      <div draggable className="team-card"
                        onDragStart={e=>handleDragStart(e,team.id,team.office,'all')}
                        onDragEnd={()=>setDragging(null)}
                        style={{padding:'8px 10px',background:hasMoved?'#fff7ed':'#f8fafc',display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,borderBottom:'1px solid #f1f5f9',opacity:isDraggingCard(team.id,'all')?.4:1}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:12,color:'#111827',display:'flex',alignItems:'center',gap:5}}>
                            <span style={{fontSize:13,color:'#9ca3af',cursor:'grab',flexShrink:0}}>⠿</span>
                            {team.dept}
                          </div>
                          <div style={{fontSize:10,color:'#6b7280',marginTop:1,paddingLeft:17}}>
                            {hasMoved
                              ?<><span style={{color:'#dc2626',fontWeight:700}}>{remTotal}</span><span style={{color:'#9ca3af',textDecoration:'line-through',marginLeft:4}}>{total}</span><span style={{color:'#9ca3af',marginLeft:4}}>已移 {total-remTotal}</span></>
                              :<span>{total} 人（全部）</span>}
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();toggleTeam(team.id);}}
                          style={{background:'#fff',border:'1px solid #d1d5db',borderRadius:5,cursor:'pointer',color:'#374151',fontSize:10,padding:'2px 8px',fontFamily:'inherit',fontWeight:600,flexShrink:0}}>
                          {isExp?'▲ 收合':'▼ 展開'}
                        </button>
                      </div>

                      {/* Expanded: per-type rows */}
                      {isExp&&(
                        <div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 44px 44px 20px',gap:0,padding:'4px 10px 3px',background:'#fafafa',borderBottom:'1px solid #f3f4f6',fontSize:9,color:'#9ca3af',fontWeight:700,textTransform:'uppercase'}}>
                            <span>類型</span><span style={{textAlign:'right'}}>原始</span><span style={{textAlign:'right'}}>剩餘</span><span/>
                          </div>
                          {EMP_TYPES.map(et=>{
                            const base=Math.round(total*(team.bd[et]||0));
                            if(base===0)return null;
                            const rem=activeSc?(remaining[et]??base):base;
                            const moved=base-rem;
                            const allGone=rem===0;
                            const isDrg=isDraggingCard(team.id,et);
                            return(
                              <div key={et} draggable={!allGone} className={allGone?'':'team-card'}
                                onDragStart={e=>{e.stopPropagation();if(!allGone)handleDragStart(e,team.id,team.office,et);}}
                                onDragEnd={()=>setDragging(null)}
                                style={{display:'grid',gridTemplateColumns:'1fr 44px 44px 20px',alignItems:'center',
                                  padding:'7px 10px',borderBottom:'1px solid #f9fafb',
                                  background:isDrg?EMP_CHIP[et].bg:allGone?'#fafafa':'#fff',
                                  opacity:allGone?.45:isDrg?.4:1,
                                  cursor:allGone?'not-allowed':'grab',
                                  transition:'background .1s'}}>
                                {/* Label */}
                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                  <div style={{width:8,height:8,borderRadius:'50%',background:allGone?'#d1d5db':EMP_CHIP[et].txt,flexShrink:0}}/>
                                  <div>
                                    <div style={{fontSize:11,fontWeight:700,color:allGone?'#9ca3af':EMP_CHIP[et].txt}}>{EMP_LABELS[et]}</div>
                                    <div style={{fontSize:9,color:'#9ca3af'}}>{Math.round(team.bd[et]*100)}%</div>
                                  </div>
                                </div>
                                {/* Base */}
                                <div style={{textAlign:'right',fontSize:11,fontWeight:500,color:'#9ca3af',textDecoration:moved>0?'line-through':'none'}}>{base}</div>
                                {/* Remaining */}
                                <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:allGone?'#9ca3af':moved>0?'#dc2626':EMP_CHIP[et].txt}}>
                                  {allGone?<span style={{fontSize:9}}>全移</span>:rem}
                                </div>
                                {/* Drag icon */}
                                <div style={{textAlign:'center',fontSize:12,color:'#9ca3af'}}>{!allGone&&'⠿'}</div>
                              </div>
                            );
                          })}
                          {/* Type bar */}
                          <div style={{display:'flex',gap:2,padding:'5px 10px',background:'#fafafa'}}>
                            {EMP_TYPES.filter(et=>Math.round(total*(team.bd[et]||0))>0).map(et=>{
                              const base=Math.round(total*(team.bd[et]||0));
                              const rem=activeSc?(remaining[et]??base):base;
                              return<div key={et} title={`${EMP_LABELS[et]}: ${rem}/${base}`}
                                style={{flex:base/total,height:4,borderRadius:2,background:rem===0?'#e5e7eb':EMP_CHIP[et].txt,opacity:rem===0?.3:1,transition:'all .3s'}}/>;
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* RIGHT: Office canvas */}
        <div style={{flex:1,display:'flex',gap:8,overflowX:'auto',paddingBottom:4,alignItems:'flex-start'}}>
          {OFFICES.map(o=>{
            const teams=canvasData[o.id]||[];
            const load=calcOfficeLoad(o.id,viewMonth,activeSc?.moves||[],gw,deptOv);
            const baseLoad=calcOfficeLoad(o.id,viewMonth,[],gw,deptOv);
            const wp=pct(load.weighted,o.cap);
            const s=statusOf(wp);
            const remain=o.cap-load.actual;
            const baseRemain=o.cap-baseLoad.actual;
            const isTarget=dropTarget===o.id;
            return(
              <div key={o.id} className={isTarget?'drag-over':''}
                onDragOver={e=>{e.preventDefault();setDropTarget(o.id);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDropTarget(null);}}
                onDrop={e=>handleDrop(e,o.id)}
                style={{minWidth:168,flex:1,border:`2px solid ${isTarget?'#1d4ed8':SC[s].border}`,borderRadius:10,background:isTarget?'#eff6ff':SC[s].bg,padding:9,transition:'all .15s'}}>
                {/* Office header */}
                <div style={{marginBottom:8,paddingBottom:7,borderBottom:`1px solid ${SC[s].border}`}}>
                  <div style={{fontWeight:700,fontSize:13}}>{o.name}</div>
                  <div style={{fontSize:10,color:'#6b7280'}}>容量 {o.cap}</div>
                  <div style={{marginTop:5,display:'flex',justifyContent:'space-between',fontSize:10}}>
                    <span style={{color:'#6b7280'}}>已佔 {load.actual}</span>
                    <span style={{fontWeight:700,color:remain<10?'#dc2626':remain<50?'#d97706':'#059669'}}>
                      剩 {remain} 座
                    </span>
                  </div>
                  <div style={{height:4,background:'rgba(0,0,0,.06)',borderRadius:3,marginTop:4}}>
                    <div style={{height:4,background:SC[s].bar,borderRadius:3,width:Math.min(wp,100)+'%',transition:'width .3s'}}/>
                  </div>
                  {load.actual!==baseLoad.actual&&(
                    <div style={{fontSize:9,color:'#d97706',marginTop:3}}>
                      ⚡ 基準剩 {baseRemain} → 模擬剩 {remain} ({remain>baseRemain?'+':''}{remain-baseRemain})
                    </div>
                  )}
                </div>
                {/* Teams */}
                {teams.length===0?(
                  <div style={{textAlign:'center',color:isTarget?'#1d4ed8':'#9ca3af',fontSize:11,padding:'20px 0'}}>
                    {isTarget?'↓ 放開以移入':'（空的）'}
                  </div>
                ):teams.map(({team,total,ts,inBy,outBy})=>{
                  const hasIn=Object.values(inBy).some(v=>v>0);
                  const hasOut=Object.values(outBy).some(v=>v>0);
                  return(
                    <div key={team.id} draggable className="team-card"
                      onDragStart={e=>handleDragStart(e,team.id,o.id,'all')}
                      onDragEnd={()=>setDragging(null)}
                      style={{padding:'6px 9px',borderRadius:7,marginBottom:5,fontSize:11,
                        background:hasIn?'#eff6ff':hasOut?'#fff7ed':'#fff',
                        border:`1px solid ${hasIn?'#bfdbfe':hasOut?'#fed7aa':'#e5e7eb'}`,
                        opacity:isDraggingCard(team.id,'all')?.4:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <span style={{fontWeight:700,color:'#111827',fontSize:11}}>{team.dept}</span>
                        <div style={{display:'flex',gap:3}}>
                          {hasIn&&<span style={{fontSize:9,background:'#dbeafe',color:'#1d4ed8',borderRadius:3,padding:'1px 4px'}}>↘移入</span>}
                          {hasOut&&<span style={{fontSize:9,background:'#fef3c7',color:'#92400e',borderRadius:3,padding:'1px 4px'}}>↗移出</span>}
                          <span style={{fontSize:12,color:'#9ca3af',cursor:'grab'}}>⠿</span>
                        </div>
                      </div>
                      {EMP_TYPES.map(et=>{
                        const cnt=ts[et]||0;const inC=inBy[et]||0;const outC=outBy[et]||0;
                        if(cnt===0&&inC===0&&outC===0)return null;
                        return(
                          <div key={et} style={{display:'flex',alignItems:'center',gap:4,marginBottom:1}}>
                            <div style={{width:6,height:6,borderRadius:'50%',background:EMP_CHIP[et].txt,flexShrink:0}}/>
                            <span style={{fontSize:9,color:EMP_CHIP[et].txt,fontWeight:600,width:58}}>{EMP_LABELS[et]}</span>
                            <span style={{fontSize:10,fontWeight:700,color:'#374151',width:22,textAlign:'right'}}>{cnt}</span>
                            {inC>0&&<span style={{fontSize:8,color:'#059669',background:'#d1fae5',borderRadius:2,padding:'0 3px'}}>+{inC}</span>}
                            {outC>0&&<span style={{fontSize:8,color:'#dc2626',background:'#fee2e2',borderRadius:2,padding:'0 3px'}}>-{outC}</span>}
                          </div>
                        );
                      })}
                      <div style={{marginTop:4,paddingTop:3,borderTop:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',fontSize:9,color:'#9ca3af'}}>
                        <span>合計</span><span style={{fontWeight:700,color:'#374151'}}>{total} 人</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      {/* Moves summary */}
      {activeSc&&activeSc.moves.length>0&&(
        <div className="card" style={{marginTop:12,padding:'10px 14px'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>挪移清單 ({activeSc.moves.length} 筆)</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {activeSc.moves.map(mv=>{
              const team=TEAMS.find(t=>t.id===mv.teamId);
              const tc=tChip(mv.empType);
              // Check for over-commitment
              const warnings=getMoveWarnings(mv.teamId,mv.empType,mv.seats);
              const hasWarn=warnings.some(w=>!w.ok);
              return(
                <div key={mv.id} style={{display:'flex',alignItems:'center',gap:6,background:hasWarn?'#fffbeb':'#f8fafc',border:`1px solid ${hasWarn?'#fde68a':'#e5e7eb'}`,borderRadius:8,padding:'5px 9px',fontSize:11}}>
                  {hasWarn&&<span title="某月份可用人數不足">⚠</span>}
                  <span style={{fontWeight:700}}>{team?.dept}</span>
                  <span className="pill" style={{background:tc.bg,color:tc.txt,fontSize:9}}>{tLabel(mv.empType)}</span>
                  <span style={{color:'#374151'}}>→</span>
                  <span style={{fontWeight:600,color:'#1d4ed8'}}>{officeNameById(mv.toOffice)}</span>
                  <span className="pill" style={{background:'#fef3c7',color:'#92400e',fontSize:9}}>{mv.seats}人</span>
                  <span style={{fontSize:9,color:'#9ca3af'}}>{mv.months.map(mi=>MONTHS[mi]).join('/')}</span>
                  <button onClick={()=>deleteMove(mv.id)} style={{background:'none',border:'none',color:'#9ca3af',cursor:'pointer',fontSize:13,lineHeight:1,fontFamily:'inherit'}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Pending move modal */}
      {pendingMove&&(()=>{
        const team=TEAMS.find(t=>t.id===pendingMove.teamId);
        const total=team?.seats[viewMonth]||0;
        const maxSeats=pendingMove.empType==='all'?total:Math.round(total*(team?.bd[pendingMove.empType]||0));
        const tc=tChip(pendingMove.empType);
        const seatsNum=parseInt(moveSeats)||0;
        const warnings=seatsNum>0?getMoveWarnings(pendingMove.teamId,pendingMove.empType,seatsNum):[];
        const hasWarn=warnings.some(w=>!w.ok);
        return(
          <Modal title="確認挪移設定" onClose={()=>setPendingMove(null)} width={480}>
            <div style={{padding:12,background:'#f8fafc',borderRadius:8,marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontWeight:700,fontSize:14}}>{team?.dept}</span>
                <span className="pill" style={{background:tc.bg,color:tc.txt}}>{tLabel(pendingMove.empType)}</span>
              </div>
              <div style={{fontSize:12,color:'#374151',display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:'#6b7280'}}>{officeNameById(pendingMove.fromOffice)}</span>
                <span style={{fontWeight:700,color:'#1d4ed8',fontSize:16}}>→</span>
                <span style={{fontWeight:700,color:'#1d4ed8'}}>{officeNameById(pendingMove.toOffice)}</span>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <label className="lbl">挪移人數（{MONTHS[viewMonth]} 可用：{maxSeats}）</label>
              <input type="number" className="inp" min={1} max={maxSeats} value={moveSeats}
                onChange={e=>setMoveSeats(e.target.value)} autoFocus/>
              <div style={{height:4,background:'#f1f5f9',borderRadius:2,marginTop:6}}>
                <div style={{height:4,background:tc.txt||'#1d4ed8',borderRadius:2,width:Math.min(100,Math.round(seatsNum/Math.max(maxSeats,1)*100))+'%',transition:'width .2s'}}/>
              </div>
            </div>
            {/* Per-month preview */}
            {moveMonths.length>0&&seatsNum>0&&(
              <div style={{marginBottom:14}}>
                <label className="lbl">各月份影響預覽</label>
                <div style={{border:'1px solid #e5e7eb',borderRadius:7,overflow:'hidden'}}>
                  <div style={{display:'grid',gridTemplateColumns:'50px 60px 60px 60px',background:'#f8fafc',padding:'5px 10px',fontSize:10,fontWeight:700,color:'#6b7280',gap:8}}>
                    <span>月份</span><span style={{textAlign:'right'}}>可用</span><span style={{textAlign:'right'}}>移出</span><span style={{textAlign:'right'}}>剩餘</span>
                  </div>
                  {moveMonths.map(mi=>{
                    const base=team?.seats[mi]||0;
                    const avail=pendingMove.empType==='all'?base:Math.round(base*(team?.bd[pendingMove.empType]||0));
                    const actual=Math.min(seatsNum,avail);
                    const ok=seatsNum<=avail;
                    return(
                      <div key={mi} style={{display:'grid',gridTemplateColumns:'50px 60px 60px 60px',padding:'5px 10px',fontSize:11,gap:8,borderTop:'1px solid #f3f4f6',background:ok?'#fff':'#fefce8'}}>
                        <span style={{fontWeight:600}}>{MONTHS[mi]}'26</span>
                        <span style={{textAlign:'right',color:'#6b7280'}}>{avail}</span>
                        <span style={{textAlign:'right',fontWeight:600,color:ok?'#374151':'#dc2626'}}>{seatsNum}{!ok&&<span style={{fontSize:9}}> ⚠</span>}</span>
                        <span style={{textAlign:'right',fontWeight:700,color:ok?'#059669':'#d97706'}}>{avail-actual}</span>
                      </div>
                    );
                  })}
                </div>
                {hasWarn&&<div style={{fontSize:10,color:'#92400e',marginTop:5,background:'#fffbeb',border:'1px solid #fde68a',borderRadius:5,padding:'5px 8px'}}>⚠ 部分月份可用人數不足，系統將自動以實際可用數為上限</div>}
              </div>
            )}
            <div style={{marginBottom:16}}>
              <label className="lbl">套用月份（藍色 = 選取中）</label>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {MONTHS.map((m,mi)=>{const s=moveMonths.includes(mi);return(
                  <span key={mi} className="chip" onClick={()=>toggleMonth(mi)}
                    style={{borderColor:s?'#1d4ed8':'#d1d5db',background:s?'#eff6ff':'#fff',color:s?'#1d4ed8':'#6b7280',fontSize:10}}>
                    {m}
                  </span>
                );})}
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setPendingMove(null)}>取消</button>

// ── WEIGHT SETTINGS ───────────────────────────────────────────────────────────
function WeightSettings({gw,setGw,deptOv,setDeptOv,showToast,user}){
  const {can}=useAccessControl(user);
  const canEdit=can('weight-edit');
  const [localGw,setLocalGw]=useState({...gw});
  const [localDov,setLocalDov]=useState({...deptOv});
  const [preview,setPreview]=useState(false);

  const applyGlobal=()=>{setGw({...localGw});showToast('✓ 全域權重已更新');};
  const applyDept=()=>{setDeptOv({...localDov});showToast('✓ 部門權重已更新');};

  const updateDeptW=(dept,type,val)=>{
    setLocalDov(prev=>({...prev,[dept]:{...(prev[dept]||{}), [type]:parseFloat(val)||0}}));
  };
  const toggleDeptOv=(dept)=>{
    setLocalDov(prev=>{
      const next={...prev};
      if(next[dept]) delete next[dept];
      else next[dept]={...localGw};
      return next;
    });
  };

  const allDepts=[...new Set(TEAMS.map(t=>t.dept))];

  return(
    <div className="fu">
      <div style={{marginBottom:16}}>
        <div className="stitle">座位權重設定</div>
        <div className="ssub">調整各員工類型的座位佔用係數，影響負載計算與警示</div>
      </div>

      {/* Global Weights */}
      <div className="card" style={{padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>全域預設權重</div>
            <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>套用至所有未設定部門覆寫的計算</div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
          {EMP_TYPES.map(t=>(
            <div key={t}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <label className="lbl" style={{marginBottom:0}}>{EMP_LABELS[t]}</label>

                onChange={e=>setLocalGw(p=>({...p,[t]:parseFloat(e.target.value)}))}

                <span>0.0 不計</span><span>1.0 全算</span>
              </div>
              <div style={{marginTop:8,padding:'6px 10px',background:EMP_CHIP[t].bg,borderRadius:6,fontSize:11}}>
                <span style={{color:EMP_CHIP[t].txt,fontWeight:600}}>100人</span>
                <span style={{color:'#6b7280'}}>→ </span>
                <span style={{color:EMP_CHIP[t].txt,fontWeight:700}}>{Math.round(100*localGw[t])} 負載</span>

          <button className="btn btn-ghost btn-sm" onClick={()=>setPreview(!preview)}>{preview?'▲ 收起':'▼ 展開'}</button>
        </div>
        {preview&&(
          <table className="tbl">
            <thead><tr><th>部門</th><th>辦公室</th><th style={{textAlign:'right'}}>實際人數</th><th style={{textAlign:'right'}}>權重負載</th><th style={{textAlign:'right'}}>差異</th></tr></thead>
            <tbody>
              {TEAMS.filter(t=>t.seats[0]>0).map(t=>{
                const actual=t.seats[0];
                const factor=weightedFactor(t,localGw,localDov);
                const weighted=Math.round(actual*factor);
                return(
                  <tr key={t.id}>
                    <td style={{fontWeight:600}}>{t.dept}</td>
                    <td style={{color:'#6b7280'}}>{t.office}</td>

                  </tr>
                );

          </table>
        )}
      </div>

      {!canEdit&&<div style={{marginTop:12,padding:12,background:'#fefce8',border:'1px solid #fde047',borderRadius:8,fontSize:12,color:'#92400e',textAlign:'center'}}>⚠ 你的角色為 {ROLE_META[user.role]?.label}，僅能檢視權重設定，無法修改</div>}

  );
}

function UserManagement({users,setUsers,showToast,logAction}){
  const [editing,setEditing]=useState(null);
  const [newUser,setNewUser]=useState({name:'',email:'',role:'viewer',depts:[],ini:''});
  const [adding,setAdding]=useState(false);
  const allDepts=[...new Set(TEAMS.map(t=>t.dept))];

  const saveEdit=()=>{
    setUsers(prev=>prev.map(u=>u.id===editing.id?editing:u));
    setEditing(null);
    showToast('✓ 使用者設定已更新');
    logAction(`更新使用者：${editing.name} → ${editing.role}`);
  };
  const toggleUserActive=u=>{
    setUsers(prev=>prev.map(x=>x.id===u.id?{...x,active:!x.active}:x));
    logAction(`${u.active?'停用':'啟用'}帳號：${u.name}`);
    showToast(`✓ 帳號已${u.active?'停用':'啟用'}`);
  };
  const addNewUser=()=>{
    if(!newUser.name.trim()||!newUser.email.trim())return;
    const u={...newUser,id:`u${Date.now()}`,ini:newUser.name.split(' ').map(s=>s[0]).join('').toUpperCase().slice(0,2),active:true};
    setUsers(prev=>[...prev,u]);
    setAdding(false);
    setNewUser({name:'',email:'',role:'viewer',depts:[],ini:''});
    showToast('✓ 已新增使用者');
    logAction(`新增使用者：${u.name} (${u.role})`);
  };

  const ToggleDept=(user,dept,setter)=>{
    const cur=user.depts||[];
    setter({...user,depts:cur.includes(dept)?cur.filter(d=>d!==dept):[...cur,dept]});
  };

    <div className="fu">

      {adding&&(
        <div className="card fu" style={{padding:'18px 20px',marginBottom:14,border:'1px solid #bfdbfe',background:'#eff6ff'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>新增使用者</div>

            <div><label className="lbl">姓名</label><input className="inp" value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="姓名"/></div>
            <div><label className="lbl">Email (@corp.com)</label><input className="inp" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} placeholder="name@corp.com"/></div>
            <div><label className="lbl">角色</label>
              <select className="sel" style={{width:'100%'}} value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}>
                <option value="viewer">Viewer</option>
                <option value="manager">Manager</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label className="lbl">可存取部門（空白 = 所有部門）</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {allDepts.map(d=>{const s=(newUser.depts||[]).includes(d);return<span key={d} className="chip" onClick={()=>ToggleDept(newUser,d,setNewUser)} style={{borderColor:s?'#1d4ed8':'#d1d5db',background:s?'#eff6ff':'#fff',color:s?'#1d4ed8':'#6b7280',fontSize:10}}>{d}</span>;})}

                  </div>

            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(p=>({...p,depts:[]}))}>清除（允許全部）</button>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={()=>setEditing(null)}>取消</button>
            <button className="btn btn-primary" onClick={saveEdit}>儲存</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── DATA SYNC ─────────────────────────────────────────────────────────────────
function DataSync({showToast,user,logAction,liveTeams,setLiveTeams}){
  const [status,setStatus]=useState(()=>liveTeams?'connected':'idle');
  const [lastSync,setLastSync]=useState(null);
  const [previewRows,setPreviewRows]=useState([]);
  const [sheetMsg,setSheetMsg]=useState('');
  const [showSetup,setShowSetup]=useState(false);
  const [localCfg,setLocalCfg]=useState(()=>LS.get('sf-sheets-cfg')||{clientId:CONFIG.CLIENT_ID,spreadsheetId:CONFIG.SPREADSHEET_ID,sheetName:'SeatFlow_Teams',domain:CONFIG.ALLOWED_DOMAIN});
  const saveCfg=c=>{setLocalCfg(c);LS.set('sf-sheets-cfg',c);};

  const doFetch=async(token)=>{
    setStatus('connecting');setSheetMsg('讀取試算表中...');
    try{
      const sid=localCfg.spreadsheetId||CONFIG.SPREADSHEET_ID;
      const sname=localCfg.sheetName||'SeatFlow_Teams';
      const rows=await fetchRange(token,sname);
      if(rows.length<2){setSheetMsg('資料為空，請確認工作表名稱與範圍');setStatus('error');return;}
      setPreviewRows(rows.slice(0,5));
      const parsed=parseTeamsSheet(rows);
      if(!parsed||!parsed.length){setSheetMsg('解析失敗，請確認欄位格式');setStatus('error');return;}
      setLiveTeams(parsed);LS.set('sf-live-teams',parsed);
      setStatus('connected');setLastSync(new Date().toLocaleString('zh-TW'));
      setSheetMsg(`✓ 成功讀取 ${rows.length-1} 筆，已套用至儀表板`);
      showToast(`✓ Google Sheet 同步完成（${rows.length-1} 筆資料）`);
      logAction(`Google Sheet 同步 ${rows.length-1} 筆`,'sync');
    }catch(e){setStatus('error');setSheetMsg('錯誤：'+e.message);showToast(e.message,'error');}
  };

  const handleConnect=()=>{
    const cid=localCfg.clientId||CONFIG.CLIENT_ID;
    if(!cid||!(localCfg.spreadsheetId||CONFIG.SPREADSHEET_ID)){
      setShowSetup(true);setSheetMsg('請先填入 Client ID 與 Spreadsheet ID');return;
    }
    if(window.google?.accounts?.oauth2){
      const tc=window.google.accounts.oauth2.initTokenClient({
        client_id:cid,
        scope:'https://www.googleapis.com/auth/spreadsheets.readonly',
        callback:r=>{if(r.error){setStatus('error');setSheetMsg('授權失敗：'+r.error);return;}doFetch(r.access_token);}
      });
      tc.requestAccessToken();
    }else{
      setStatus('connecting');
      setTimeout(()=>{
        setStatus('error');
        setSheetMsg('Google API 未載入，請確認網路連線或 Client ID 設定');
      },1000);
    }
  };
  const disconnect=()=>{setStatus('idle');setPreviewRows([]);setLastSync(null);setSheetMsg('');setLiveTeams(null);LS.del('sf-live-teams');};

  return(
    <div className="fu">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">Google Sheet 資料同步</div>
          <div className="ssub">連接後，儀表板座位數據將直接從你的 Google Sheet 讀取</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowSetup(!showSetup)}>⚙ 連線設定</button>
      </div>

      {showSetup&&(
        <div className="card fu" style={{padding:'18px 20px',marginBottom:14,border:'1px solid #bfdbfe',background:'#eff6ff'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1e40af',marginBottom:12}}>連線設定</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div><label className="lbl">OAuth 2.0 Client ID</label><input className="inp" value={localCfg.clientId||''} onChange={e=>saveCfg({...localCfg,clientId:e.target.value})} placeholder="xxxx.apps.googleusercontent.com"/></div>
            <div><label className="lbl">限定登入網域</label><input className="inp" value={localCfg.domain||''} onChange={e=>saveCfg({...localCfg,domain:e.target.value})} placeholder="yourcompany.com"/></div>
            <div><label className="lbl">Spreadsheet ID</label><input className="inp" value={localCfg.spreadsheetId||''} onChange={e=>saveCfg({...localCfg,spreadsheetId:e.target.value})} placeholder="從 Sheet URL 的 /d/XXXXX/edit 複製"/></div>
            <div><label className="lbl">工作表名稱（Tab）</label><input className="inp" value={localCfg.sheetName||'SeatFlow_Teams'} onChange={e=>saveCfg({...localCfg,sheetName:e.target.value})} placeholder="SeatFlow_Teams"/></div>
          </div>
          <div style={{background:'#1e293b',borderRadius:7,padding:12,fontFamily:'monospace',fontSize:10,color:'#94a3b8',lineHeight:1.8}}>
            <div style={{color:'#7dd3fc',marginBottom:4}}>// Google Sheet 欄位格式（第一列為標頭）：</div>
            <div style={{color:'#e2e8f0'}}>team_id | dept | office | ft% | ct% | in% | bpo% | Apr | May | Jun | Jul | Aug | Sep | Oct | Nov | Dec</div>
            <div style={{color:'#64748b',marginTop:4}}>
              // ft%=full-time比例(0-1), ct%=contractor比例, in%=intern比例, bpo%=BPO比例<br/>
              // Apr–Dec 為各月實際頭人數<br/>
              // 範例：t1 | BD | TNH | 0.72 | 0.20 | 0.05 | 0.03 | 415 | 427 | 428 | 432 | 432 | 434 | 435 | 437 | 436
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>
              {status==='connected'?<span style={{color:'#059669'}}>● 已連線</span>
               :status==='connecting'?<span style={{color:'#d97706'}}>◉ 連線中...</span>
               :status==='error'?<span style={{color:'#dc2626'}}>✕ 失敗</span>
               :<span style={{color:'#9ca3af'}}>○ 尚未連線</span>}
            </div>
            {sheetMsg&&<div style={{fontSize:11,color:status==='error'?'#dc2626':'#059669'}}>{sheetMsg}</div>}
            {lastSync&&<div style={{fontSize:10,color:'#9ca3af',marginTop:2}}>最後同步：{lastSync}</div>}
          </div>
          {status!=='connected'
            ?<button className="btn btn-primary" onClick={handleConnect} disabled={status==='connecting'}>
              🔗 {status==='connecting'?'連線中...':'連接 Google Sheet'}
            </button>
            :<div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={handleConnect}>↻ 重新同步</button>
              <button className="btn btn-ghost btn-sm" onClick={disconnect}>中斷</button>
            </div>}
        </div>
      </div>

      {previewRows.length>0&&(
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid #e5e7eb',fontWeight:700,fontSize:12}}>資料預覽</div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>{(previewRows[0]||[]).map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
              <tbody>{previewRows.slice(1).map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
            </table>
          </div>
        </div>
      )}
      {status!=='connected'&&!previewRows.length&&(
        <div style={{textAlign:'center',color:'#9ca3af',padding:'40px 20px'}}>
          <div style={{fontSize:30,marginBottom:8}}>📊</div>
          <div style={{fontWeight:600,marginBottom:4}}>尚未連接 Google Sheet</div>
          <div style={{fontSize:11}}>目前使用內建示範資料。連接後將以 Sheet 資料為準。</div>
        </div>
      )}
    </div>
  );
}

// ── EDIT LOG ─────────────────────────────────────────────────────────────────
function EditLog({log}){
  return(
    <div className="fu">
      <div style={{marginBottom:14}}><div className="stitle">操作稽核紀錄</div><div className="ssub">所有使用者的資料異動、登入與同步操作</div></div>
      <div className="card" style={{overflow:'hidden'}}>
        <table className="tbl">
          <thead><tr><th>操作人員</th><th>動作</th><th>時間</th><th>類型</th></tr></thead>
          <tbody>
            {log.length===0&&<tr><td colSpan={4} style={{textAlign:'center',color:'#9ca3af',padding:30}}>尚無紀錄</td></tr>}
            {log.map(l=>(
              <tr key={l.id}>
                <td style={{fontWeight:600}}>{l.user}</td>
                <td style={{color:'#374151'}}>{l.action}</td>
                <td style={{color:'#9ca3af',whiteSpace:'nowrap',fontSize:11}}>{l.ts}</td>
                <td><span className="pill" style={{background:l.type==='sync'?'#f0fdf4':'#eff6ff',color:l.type==='sync'?'#166534':'#1e40af'}}>{l.type==='sync'?'同步':'操作'}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>LS.get('sf-user'));
  const [tab,setTab]=useState('dashboard');
  const [users,setUsers]=useState(()=>LS.get('sf-users')||INIT_USERS);
  const [scenarios,setScenarios]=useState(()=>LS.get('sf-scenarios')||[
    {id:'sc0',name:'HOS 滿載模擬',createdBy:'AC',createdAt:'2026-04-20',moves:[{id:'m0',teamId:'t4',toOffice:'UDN',months:[0,1,2],seats:80}]}
  ]);
  const [activeScId,setActiveScId]=useState(null);
  const [gw,setGw]=useState(()=>LS.get('sf-weights')||DEFAULT_WEIGHTS);
  const [deptOv,setDeptOv]=useState(()=>LS.get('sf-deptov')||{});
  const [liveTeams,setLiveTeams]=useState(()=>LS.get('sf-live-teams')||null);
  const [editLog,setEditLog]=useState(()=>LS.get('sf-log')||[
    {id:'l1',user:'Angel Chen',action:'系統初始化',ts:'2026-04-23 09:00',type:'sync'},
  ]);
  const [toast,setToast]=useState(null);

  useEffect(()=>LS.set('sf-users',users),[users]);
  useEffect(()=>LS.set('sf-weights',gw),[gw]);
  useEffect(()=>LS.set('sf-deptov',deptOv),[deptOv]);

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  const logAction=(action,type='edit')=>{
    const entry={id:`l${Date.now()}`,user:user?.name||'?',action,ts:new Date().toLocaleString('zh-TW'),type};
    setEditLog(prev=>{const next=[entry,...prev.slice(0,99)];LS.set('sf-log',next);return next;});
  };
  const handleLogin=u=>{setUser(u);LS.set('sf-user',u);logAction('使用者登入','sync');};
  const handleLogout=()=>{setUser(null);LS.del('sf-user');};

  const {can}=useAccessControl(user);
  const activeSc=scenarios.find(s=>s.id===activeScId);
  const activeScMoves=activeSc?.moves||[];

  if(!user) return <LoginScreen users={users} onLogin={handleLogin}/>;

  const NAV=[
    {key:'dashboard',label:'📊 總覽'},
    {key:'scenario', label:'🔀 情境模擬',hide:!can('scenario')},
    {key:'data',     label:'📊 資料同步'},
    {key:'weights',  label:'⚖ 權重設定'},
    {key:'users',    label:'👥 使用者管理',hide:!can('manage-users')},
    {key:'log',      label:'📋 稽核紀錄'},
  ].filter(t=>!t.hide);

  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      {/* Header */}
      <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',height:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{fontWeight:800,fontSize:14,letterSpacing:'-0.5px',color:'#111827',flexShrink:0}}>
            SeatFlow <span style={{fontSize:10,background:'#1d4ed8',color:'#fff',borderRadius:3,padding:'1px 6px',fontWeight:700}}>Enterprise</span>
          </div>
          <nav style={{display:'flex',gap:1}}>
            {NAV.map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)}
                style={{padding:'5px 13px',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:tab===t.key?700:400,background:tab===t.key?'#eff6ff':'transparent',color:tab===t.key?'#1d4ed8':'#6b7280',whiteSpace:'nowrap'}}>
                {t.label}
              </button>
            ))}
          </nav>
          {activeSc&&(
            <div style={{display:'flex',alignItems:'center',gap:7,padding:'3px 10px',background:'#fefce8',border:'1px solid #fde047',borderRadius:20,fontSize:11,fontWeight:600,color:'#92400e'}}>
              ⚡ {activeSc.name}
              <button onClick={()=>setActiveScId(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#92400e',fontSize:13,padding:0,lineHeight:1,fontFamily:'inherit'}}>×</button>
            </div>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span className="pill" style={{background:ROLE_META[user.role].bg,color:ROLE_META[user.role].txt,fontSize:10}}>{ROLE_META[user.role].label}</span>
          <Avatar ini={user.ini} size={28}/>
          <span style={{fontSize:12,color:'#374151',fontWeight:500}}>{user.name}</span>
          <button onClick={handleLogout} className="btn btn-ghost btn-sm">登出</button>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:'18px 20px',maxWidth:1500,margin:'0 auto'}}>
        {tab==='dashboard'&&<Dashboard moves={activeScMoves} gw={gw} deptOv={deptOv} activeScenario={activeSc} liveTeams={liveTeams}/>}
        {tab==='scenario'&&<ScenarioBuilder scenarios={scenarios} setScenarios={setScenarios} activeScId={activeScId} setActiveScId={setActiveScId} gw={gw} setGw={v=>{setGw(v);logAction('從情境頁更新權重');LS.set('sf-weights',v);}} deptOv={deptOv} showToast={showToast} logAction={logAction} user={user}/>}
        {tab==='data'&&<DataSync showToast={showToast} user={user} logAction={logAction} liveTeams={liveTeams} setLiveTeams={setLiveTeams}/>}
        {tab==='weights'&&<WeightSettings gw={gw} setGw={v=>{setGw(v);logAction('更新全域權重');}} deptOv={deptOv} setDeptOv={v=>{setDeptOv(v);logAction('更新部門權重覆寫');}} showToast={showToast} user={user}/>}
        {tab==='users'&&<UserManagement users={users} setUsers={setUsers} showToast={showToast} logAction={logAction}/>}
        {tab==='log'&&<EditLog log={editLog}/>}
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
