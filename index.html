function LoginScreen({onLogin}){
  const users=INIT_USERS;
  const [step,setStep]=useState(0);
  const [picked,setPicked]=useState(null);
  const [loading,setLoading]=useState(false);
  const [gError,setGError]=useState('');
  const gBtnRef=useRef(null);

  // Real OAuth mode: render Google button
  useEffect(()=>{
    if(DEMO_MODE||!gBtnRef.current)return;
    const init=()=>{
      if(!window.google?.accounts)return setTimeout(init,200);
      window.google.accounts.id.initialize({
        client_id:CONFIG.CLIENT_ID,
        ...(CONFIG.ALLOWED_DOMAIN?{hosted_domain:CONFIG.ALLOWED_DOMAIN}:{}),
        callback:async(res)=>{
          try{
            const p=JSON.parse(atob(res.credential.split('.')[1]));
            if(CONFIG.ALLOWED_DOMAIN&&p.hd!==CONFIG.ALLOWED_DOMAIN){
              setGError(`僅限 @${CONFIG.ALLOWED_DOMAIN} 網域帳號`);return;
            }
            const ini=(p.name||p.email).split(' ').map(s=>s[0]||'').join('').toUpperCase().slice(0,2)||'?';
            const u={id:p.sub,name:p.name||p.email,email:p.email,ini,role:'viewer',depts:[],active:true,picture:p.picture||''};
            // Check if user already exists in system (to preserve role)
            // INIT_USERS 定義的帳號以其角色為準（admin 不會被降為 viewer）
            // Check sf-users (browser-local) AND INIT_USERS (baked into HTML after export)
            const initUser=INIT_USERS.find(x=>x.email===p.email);
            // Verify Sheet access before allowing in
            const cfg=LS.get('sf-sheets-cfg')||{};
            const sid=cfg.spreadsheetId||CONFIG.SPREADSHEET_ID;
            if(sid){
              // Request access token to verify Sheet permission
              let sheetAccessOk=false;
              await new Promise(resolve=>{
                try{
                  const tc=window.google.accounts.oauth2.initTokenClient({
                    client_id:CONFIG.CLIENT_ID,
                    scope:'https://www.googleapis.com/auth/spreadsheets.readonly',
                    hint:p.email,
                    callback:async r=>{
                      if(r.error||!r.access_token){resolve(false);return;}
                      try{
                        const testRes=await fetch(
                          'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'?fields=spreadsheetId',
                          {headers:{Authorization:'Bearer '+r.access_token}}
                        );
                        sheetAccessOk=testRes.ok;
                      }catch(e){sheetAccessOk=true;} // network error - let through
                      resolve(true);
                    },
                  });
                  tc.requestAccessToken({prompt:'none'}); // silent token, no popup if already consented
                }catch(e){sheetAccessOk=true;resolve(true);}
              });
              if(!sheetAccessOk){
                setGError('此帳號沒有 Google Sheet 查閱權限，請聯繫管理員');return;
              }
            }

            // Sheet access confirmed — let them in
            const user=initUser||{
              id:'u_'+Date.now(),name:p.name||p.email,email:p.email,
              ini:(p.name||p.email).split(/\s+/).map(s=>s[0]||'').join('').toUpperCase().slice(0,2)||'??',
            };
            onLogin({...user});
          }catch(e){setGError('登入失敗：'+e.message);}
        },
      });
      window.google.accounts.id.renderButton(gBtnRef.current,{
        theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:336,locale:'zh-TW',
      });
    };
    init();
  },[]);

  // ── Real OAuth UI ──
  if(!DEMO_MODE) return(
    <div style={{minHeight:'100vh',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:400,textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:24,color:'#111827',marginBottom:4,letterSpacing:'-1px'}}>
          SeatFlow <span style={{fontSize:11,background:'#1d4ed8',color:'#fff',borderRadius:4,padding:'2px 7px',fontWeight:700}}>Enterprise</span>
        </div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:28}}>辦公室座位決策平台</div>
        <div className="card" style={{padding:'28px 28px 24px'}}>
          <div style={{fontSize:12,color:'#6b7280',marginBottom:20}}>
            {CONFIG.ALLOWED_DOMAIN
              ?<>僅限 <strong>@{CONFIG.ALLOWED_DOMAIN}</strong> 企業帳號登入</>
              :'使用 Google 帳號登入'}
          </div>
          <div ref={gBtnRef} style={{display:'flex',justifyContent:'center',minHeight:44}}/>
          {gError&&<div style={{marginTop:12,color:'#dc2626',fontSize:12,padding:'8px 12px',background:'#fef2f2',borderRadius:6}}>{gError}</div>}
          <div style={{marginTop:16,fontSize:10,color:'#9ca3af',lineHeight:1.6}}>
            登入即代表同意記錄操作紀錄於稽核日誌
          </div>
        </div>
      </div>
    </div>
  );

  // ── Demo mode UI (original) ──
  const pick=u=>{setPicked(u);setStep(1);};
  return(
    <div style={{minHeight:'100vh',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:420,textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:26,color:'#111827',marginBottom:3,letterSpacing:'-1px'}}>SeatFlow <span style={{fontSize:12,background:'#f59e0b',color:'#fff',borderRadius:4,padding:'2px 7px',letterSpacing:0,fontWeight:700,verticalAlign:'middle'}}>Demo</span></div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:28}}>展示模式（未設定 CLIENT_ID）</div>
        {step===0&&(
          <div className="card fu" style={{padding:28}}>
            <div style={{fontSize:12,fontWeight:600,color:'#374151',marginBottom:4}}>選擇測試帳號</div>
            <div style={{fontSize:11,color:'#9ca3af',marginBottom:18}}>部署後請在 CONFIG 填入 CLIENT_ID 啟用真實 Google 登入</div>
            {users.filter(u=>u.active).map(u=>(
              <button key={u.id} onClick={()=>pick(u)}
                style={{width:'100%',padding:'11px 14px',border:'1px solid #e5e7eb',borderRadius:8,background:'#fff',cursor:'pointer',marginBottom:8,display:'flex',alignItems:'center',gap:12,transition:'border .15s',fontFamily:'inherit'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='#1d4ed8'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#e5e7eb'}>
                <Avatar ini={u.ini}/><div style={{textAlign:'left'}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#111827'}}>{u.name}</div>
                  <div style={{fontSize:11,color:'#6b7280'}}>{u.email}</div>
                </div>
              </button>
            ))}
          </div>
        )}
        {step===1&&(
          <div className="card fu" style={{padding:28}}>
            <Avatar ini={picked?.ini||'?'} size={44} bg='#1d4ed8'/>
            <div style={{marginTop:12,fontWeight:700,fontSize:14,marginBottom:6}}>以 {picked?.name} 登入</div>
            <button onClick={()=>{setLoading(true);setTimeout(()=>onLogin(picked),700);}} disabled={loading}
              style={{width:'100%',padding:11,background:'#1d4ed8',color:'#fff',border:'none',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'inherit',marginTop:14}}>
              {loading?'登入中...':'確認登入'}
            </button>
            <button onClick={()=>setStep(0)} style={{marginTop:10,background:'none',border:'none',color:'#6b7280',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>← 返回</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({moves,activeScenario,liveOffices,liveMonths,liveTeams}){
  const teams=liveTeams||TEAMS;
  const offices=liveOffices||OFFICES;
  const months=liveMonths||MONTHS;
  const [expandedOffices,setExpandedOffices]=useState({});
  const toggle=id=>setExpandedOffices(p=>({...p,[id]:!p[id]}));
  const [sel,setSel]=useState(null);
  const [filterDepts,setFilterDepts]=useState(new Set());
  const [filterTypes,setFilterTypes]=useState(new Set());
  const clickCell=(officeId,officeName,mi)=>setSel(p=>p&&p.officeId===officeId&&p.mi===mi?null:{officeId,officeName,mi,month:months[mi]});

  // All unique depts and emp types from teams data
  const allDepts=useMemo(()=>[...new Set(teams.map(t=>t.dept))].sort(),[teams]);
  const allEmpTypes=useMemo(()=>{
    const s=new Set();
    teams.forEach(t=>Object.keys(t.byType||{}).forEach(et=>s.add(et)));
    return [...s].sort();
  },[teams]);

  // Filtered calc: for a given office+month, how many seats match the filter
  const filteredSeats=(officeId,mi)=>{
    if(!isFiltered) return null;
    return teams
      .filter(t=>filterDepts.size===0||filterDepts.has(t.dept))
      .reduce((sum,t)=>{
        if(t.office!==officeId) return sum;
        if(filterTypes.size>0){
          return sum+([...filterTypes].reduce((s,et)=>s+((t.byType||{})[et]?((t.byType[et]||[])[mi]||0):0),0));
        }
        return sum+(t.seats[mi]||0);
      },0);
  };
  const isFiltered=filterDepts.size>0||filterTypes.size>0;
  const rows=useMemo(()=>{
    const list=[];
    offices.forEach(o=>{
      list.push(o);
      if(expandedOffices[o.id]&&o.floors?.length) o.floors.forEach(f=>list.push({...f,isFloor:true}));
    });
    return list;
  },[expandedOffices]);
  const totalCap=offices.reduce((s,o)=>s+o.cap+(o.floors||[]).reduce((fs,f)=>fs+f.cap,0),0);

  return(
    <div className="fu">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">座位使用率總覽</div>
          <div className="ssub">{activeScenario?<span style={{color:'#d97706',fontWeight:600}}>⚡ 情境模式：{activeScenario.name}</span>:'Apr–Dec 2026 · 實際人數 ÷ 容量'}</div>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          {[['ok','< 80%'],['warn','80–94%'],['danger','≥ 95%']].map(([s,l])=>(
            <div key={s} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6b7280'}}>
              <div style={{width:10,height:10,borderRadius:2,background:SC[s].bar}}/>
              {l}
            </div>
          ))}
        </div>
      </div>

      {/* Filter bar */}
      <div className="card" style={{padding:'12px 16px',marginBottom:12}}>
        <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
          {/* Dept multi-select */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:700,color:'#374151',marginBottom:7}}>部門篩選（可多選）</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {allDepts.map(d=>{
                const on=filterDepts.has(d);
                return(
                  <span key={d} className="chip" onClick={()=>{
                    setSel(null);
                    setFilterDepts(prev=>{const n=new Set(prev);on?n.delete(d):n.add(d);return n;});
                  }} style={{borderColor:on?'#1d4ed8':'#d1d5db',background:on?'#eff6ff':'#fff',color:on?'#1d4ed8':'#6b7280',fontSize:10}}>
                    {d}
                  </span>
                );
              })}
            </div>
          </div>
          {/* Divider */}
          <div style={{width:1,background:'#e5e7eb',alignSelf:'stretch',minHeight:32}}/>
          {/* Emp type multi-select */}
          <div style={{minWidth:220}}>
            <div style={{fontSize:11,fontWeight:700,color:'#374151',marginBottom:7}}>員工類型篩選（可多選）</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {allEmpTypes.map(et=>{
                const on=filterTypes.has(et);
                const chip={'Full-time':{bg:'#dbeafe',txt:'#1d4ed8',brd:'#bfdbfe'},'Contractor':{bg:'#cffafe',txt:'#0e7490',brd:'#99f6e4'},'Intern':{bg:'#d1fae5',txt:'#065f46',brd:'#6ee7b7'},'Part-time':{bg:'#d1fae5',txt:'#065f46',brd:'#6ee7b7'},'BPO':{bg:'#ede9fe',txt:'#5b21b6',brd:'#c4b5fd'}};
                const c=chip[et]||{bg:'#f3f4f6',txt:'#374151',brd:'#d1d5db'};
                return(
                  <span key={et} className="chip" onClick={()=>{
                    setSel(null);
                    setFilterTypes(prev=>{const n=new Set(prev);on?n.delete(et):n.add(et);return n;});
                  }} style={{borderColor:on?c.brd:'#d1d5db',background:on?c.bg:'#fff',color:on?c.txt:'#6b7280',fontSize:10}}>
                    {et}
                  </span>
                );
              })}
            </div>
          </div>
          {/* Clear */}
          {isFiltered&&(
            <div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end',paddingBottom:2}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setFilterDepts(new Set());setFilterTypes(new Set());setSel(null);}}>✕ 清除</button>
            </div>
          )}
        </div>
        {isFiltered&&(
          <div style={{marginTop:8,fontSize:11,color:'#6b7280',borderTop:'1px solid #f1f5f9',paddingTop:7}}>
            顯示：{filterDepts.size>0?[...filterDepts].join(' / '):'所有部門'}
            {filterTypes.size>0?' · '+[...filterTypes].join(' / '):''}
            的辦公室座位分布
          </div>
        )}
      </div>

      {/* KPI cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
        {offices.map(o=>{
          const vals=months.map((_,mi)=>{
            const num=isFiltered?(filteredSeats(o.id,mi)||0):calcOffice(o.id,mi,moves,teams);
            return pct(num,getMonthlyCap(o,mi));
          });
          const peak=Math.max(...vals);
          const s=statusOf(peak);
          return(
            <div key={o.id} className="card" style={{padding:'12px 14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#6b7280',marginBottom:4}}>{o.name} · {o.cap} 席</div>
              <div style={{fontSize:22,fontWeight:800,color:SC[s].txt,lineHeight:1}}>{peak}%</div>
              <div style={{fontSize:9,color:'#9ca3af',marginTop:2}}>{isFiltered?'篩選後最高使用率':'最高使用率'}</div>
              <div style={{height:3,background:'#f1f5f9',borderRadius:2,marginTop:6}}>
                <div style={{height:3,background:SC[s].bar,borderRadius:2,width:Math.min(peak,100)+'%'}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Heatmap */}
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="tbl" style={{minWidth:860}}>
            <thead>
              <tr>
                <th style={{minWidth:155}}>辦公室</th>
                <th style={{width:60,textAlign:'right'}}>容量</th>
                {months.map((m,mi)=><th key={mi} style={{textAlign:'center',minWidth:78}}>{m}</th>)}
              </tr>
            </thead>
            <tbody>
              {rows.map(row=>{
                const hasF=!row.isFloor&&row.floors?.length>0;
                return(
                  <tr key={row.id} style={{background:row.isFloor?'#fafafa':'#fff'}}>
                    <td style={{paddingLeft:row.isFloor?30:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        {row.isFloor&&<span style={{color:'#cbd5e1',fontSize:11,marginLeft:-12}}>└</span>}
                        {hasF&&<button onClick={()=>toggle(row.id)} style={{width:17,height:17,border:'1.5px solid #d1d5db',borderRadius:4,background:'transparent',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b7280',fontFamily:'inherit'}}>{expandedOffices[row.id]?'−':'+'}</button>}
                        <span style={{fontWeight:row.isFloor?400:700,fontSize:12}}>{row.name}</span>
                        {hasF&&<span style={{fontSize:9,color:'#9ca3af'}}>({row.floors.length}F)</span>}
                      </div>
                    </td>
                    <td style={{textAlign:'right',color:'#6b7280',fontWeight:500,fontSize:12}}>{row.cap}</td>
                    {months.map((_,mi)=>{
                      const rawActual=calcOffice(row.id,mi,moves,teams);
                      const actual=isFiltered?(filteredSeats(row.id,mi)??rawActual):rawActual;
                      const baseActual=calcOffice(row.id,mi,[],teams);
                      const p=pct(actual,getMonthlyCap(row,mi));
                      const s=statusOf(p);
                      const c=SC[s];
                      const changed=!isFiltered&&activeScenario&&rawActual!==baseActual;
                      if(row.cap===0&&actual===0)return <td key={mi} style={{textAlign:'center',color:'#e5e7eb',fontSize:11}}>—</td>;
                      const isSel=sel&&sel.officeId===row.id&&sel.mi===mi;
                      return(
                        <td key={mi} style={{padding:4,textAlign:'center'}}>
                          <div onClick={()=>actual>0&&clickCell(row.id,row.name,mi)}
                            style={{background:isSel?'#1d4ed8':c.bg,borderRadius:6,padding:'5px 2px',
                              border:'1.5px solid '+(isSel?'#1d4ed8':changed?'#f59e0b':'transparent'),
                              position:'relative',transition:'all .15s',
                              cursor:actual>0?'pointer':'default',
                              boxShadow:isSel?'0 0 0 3px #bfdbfe':'none'}}>
                            <div style={{fontSize:12,fontWeight:700,color:isSel?'#fff':c.txt,lineHeight:1.2}}>{actual>0?actual:'—'}</div>
                            {actual>0&&<div style={{fontSize:9,color:isSel?'rgba(255,255,255,.75)':c.txt,opacity:.8,marginTop:1}}>{p}%</div>}
                            {p>=95&&!isSel&&<div style={{position:'absolute',top:-5,left:'50%',transform:'translateX(-50%)',fontSize:9,background:'#ef4444',color:'#fff',borderRadius:3,padding:'1px 4px',whiteSpace:'nowrap'}}>⚠超載</div>}
                            {changed&&<div style={{position:'absolute',top:-4,right:-4,width:7,height:7,borderRadius:'50%',background:'#f59e0b',border:'2px solid #fff'}}/>}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
              <tr style={{background:'#f8fafc',borderTop:'2px solid #e5e7eb'}}>
                <td style={{fontWeight:700,fontSize:12}}>TOTAL</td>
                <td style={{textAlign:'right',fontWeight:700,fontSize:12}}>{totalCap}</td>
                {months.map((_,mi)=>{
                  const tot=isFiltered?offices.reduce((s,o)=>s+(filteredSeats(o.id,mi)||0),0):offices.reduce((s,o)=>s+calcOffice(o.id,mi,moves,teams),0);
                  const p=pct(tot,totalCap);const s=statusOf(p);
                  return(
                    <td key={mi} style={{padding:4,textAlign:'center'}}>
                      <div style={{background:SC[s].bg,borderRadius:6,padding:'5px 2px'}}>
                        <div style={{fontSize:12,fontWeight:700,color:SC[s].txt}}>{tot}</div>
                        <div style={{fontSize:9,color:SC[s].txt,opacity:.8}}>{p}%</div>
                      </div>
                    </td>
                  );
                })}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {sel&&(function(){
        const cap=getMonthlyCap((offices.find(o=>o.id===sel.officeId)||{cap:0,monthlyCaps:[]}),sel.mi);
        const detailTeams=teams.map(t=>{
          let s=t.seats[sel.mi]||0;
          (moves||[]).forEach(mv=>{if(mv.teamId===t.id&&mv.months.includes(sel.mi)&&t.office===sel.officeId)s=Math.max(0,s-mv.seats);});
          let inc=0;
          (moves||[]).forEach(mv=>{if(mv.toOffice===sel.officeId&&mv.months.includes(sel.mi)&&mv.teamId===t.id)inc+=mv.seats;});
          const total=(t.office===sel.officeId?s:0)+inc;
          return total>0?{team:t,total,inc}:null;
        }).filter(Boolean).sort((a,b)=>b.total-a.total);
        const grand=detailTeams.reduce((s,d)=>s+d.total,0);
        const EMP_CHIP={'Full-time':{bg:'#dbeafe',txt:'#1d4ed8'},'Contractor':{bg:'#cffafe',txt:'#0e7490'},'Intern':{bg:'#d1fae5',txt:'#065f46'},'BPO':{bg:'#ede9fe',txt:'#5b21b6'},'Part-time':{bg:'#d1fae5',txt:'#065f46'}};
        const hasTypes=detailTeams.some(d=>d.team.byType&&Object.keys(d.team.byType).length>0);
        const typeCols=hasTypes?['Full-time','Contractor','Intern','Part-time','BPO'].filter(et=>detailTeams.some(d=>(d.team.byType||{})[et]&&((d.team.byType||{})[et][sel.mi]||0)>0)):[];
        const wp=cap>0?Math.round(grand/cap*100):0;
        const s=statusOf(wp);
        return(
          <div className="card fu" style={{marginTop:14,overflow:'hidden',border:'2px solid #1d4ed8'}}>
            <div style={{padding:'12px 18px',borderBottom:'1px solid #e5e7eb',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,background:'#eff6ff'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontWeight:800,fontSize:15,color:'#111827'}}>{sel.officeName}</div>
                <div style={{fontSize:13,color:'#6b7280'}}>{sel.month}</div>
                <div style={{background:SC[s].bg,border:'1.5px solid '+SC[s].border,borderRadius:6,padding:'3px 12px',fontWeight:700,fontSize:13,color:SC[s].txt}}>
                  {grand} / {cap} 席 · {wp}%
                </div>
              </div>
              <button onClick={()=>setSel(null)} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#9ca3af',fontFamily:'inherit'}}>×</button>
            </div>
            <div style={{overflowX:'auto'}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th style={{minWidth:170}}>部門</th>
                    <th style={{width:55,textAlign:'right'}}>人數</th>
                    <th style={{width:120}}>佔容量</th>
                    {typeCols.map(et=>(
                      <th key={et} style={{width:70,textAlign:'right'}}>
                        <span style={{background:(EMP_CHIP[et]||{bg:'#f3f4f6'}).bg,color:(EMP_CHIP[et]||{txt:'#374151'}).txt,borderRadius:4,padding:'1px 6px',fontSize:9}}>{et}</span>
                      </th>
                    ))}
                    <th style={{width:70}}>備注</th>
                  </tr>
                </thead>
                <tbody>
                  {detailTeams.map(({team,total,inc})=>{
                    const pctCap=cap>0?Math.round(total/cap*100):0;
                    return(
                      <tr key={team.id}>
                        <td>
                          <span style={{fontWeight:600,color:'#111827'}}>{team.dept}</span>
                          <span style={{fontSize:10,color:'#9ca3af',marginLeft:5}}>({team.office})</span>
                        </td>
                        <td style={{textAlign:'right',fontWeight:700,fontSize:14}}>{total}</td>
                        <td style={{padding:'8px 12px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <div style={{flex:1,height:5,background:'#f1f5f9',borderRadius:3}}>
                              <div style={{height:5,background:'#1d4ed8',borderRadius:3,width:Math.min(pctCap,100)+'%'}}/>
                            </div>
                            <span style={{fontSize:10,color:'#6b7280',minWidth:28,textAlign:'right'}}>{pctCap}%</span>
                          </div>
                        </td>
                        {typeCols.map(et=>(
                          <td key={et} style={{textAlign:'right',color:'#374151',fontSize:12}}>
                            {((team.byType||{})[et]||[])[sel.mi]||0}
                          </td>
                        ))}
                        <td style={{textAlign:'center'}}>
                          {inc>0&&<span style={{fontSize:10,background:'#dbeafe',color:'#1d4ed8',borderRadius:4,padding:'1px 6px'}}>↘移入{inc}</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:'#f8fafc',borderTop:'2px solid #e5e7eb'}}>
                    <td style={{fontWeight:700}}>合計</td>
                    <td style={{textAlign:'right',fontWeight:800,fontSize:15,color:SC[s].txt}}>{grand}</td>
                    <td colSpan={typeCols.length+2}>
                      <div style={{height:7,background:'#f1f5f9',borderRadius:4,margin:'0 4px'}}>
                        <div style={{height:7,background:SC[s].bar,borderRadius:4,width:Math.min(wp,100)+'%',transition:'width .3s'}}/>
                      </div>
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        );
      }())}
    </div>
  );
}


// ── SCENARIO BUILDER (simplified, headcount only) ────────────────────────────
function ScenarioBuilder({scenarios,setScenarios,activeScId,setActiveScId,showToast,logAction,user,liveOffices,liveMonths,sheetsToken,liveTeams}){
  const offices=liveOffices||OFFICES;
  const allOffices=[...offices,...offices.flatMap(o=>o.floors||[])];
  const months=liveMonths||MONTHS;
  const teams=liveTeams||TEAMS;
  const [viewMonth,setViewMonth]=useState(0);
  const [moveMonths,setMoveMonths]=useState([0,1,2]);
  const [dragging,setDragging]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const [pendingMove,setPendingMove]=useState(null);
  const [moveSeats,setMoveSeats]=useState('');
  const [applyModal,setApplyModal]=useState(false);
  const [scName,setScName]=useState('');
  const [addingNew,setAddingNew]=useState(false);

  const activeSc=scenarios.find(s=>s.id===activeScId);
  useEffect(()=>{if(activeSc)setScName(activeSc.name);},[activeScId]);
  const isLocked=activeSc?.locked;
  const canDragDrop=activeSc&&!isLocked;

  // ── helpers ──────────────────────────────────────────────────────────────────
  const officeNameById=id=>{const o=allOffices.find(x=>x.id===id);return o?.name||id;};
  const remainColor=r=>r<0?'#dc2626':r<20?'#d97706':r<60?'#059669':'#374151';
  const remainBg=r=>r<0?'#fef2f2':r<20?'#fffbeb':r<60?'#f0fdf4':'#f9fafb';

  // ── moves per-month seat validation ──────────────────────────────────────────
  const getMoveWarnings=(teamId,seats,empType='all')=>{
    const team=teams.find(t=>t.id===teamId);if(!team)return[];
    return moveMonths.map(mi=>{
      const available=empType==='all'
        ? (team.seats[mi]||0)
        : ((team.byType||{})[empType]||[])[mi]||0;
      return{mi,available,ok:seats<=available};
    });
  };

  // ── drag handlers ─────────────────────────────────────────────────────────────
  const handleDragStart=(e,teamId,fromOffice,empType='all')=>{
    if(!canDragDrop){showToast(activeSc?'情境已鎖定，請先解鎖':'請先選擇或建立情境','error');e.preventDefault();return;}
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('teamId',teamId);
    e.dataTransfer.setData('fromOffice',fromOffice);
    e.dataTransfer.setData('empType',empType);
    setDragging({teamId,empType});
  };
  const handleDrop=(e,toOfficeId)=>{
    e.preventDefault();
    const teamId=e.dataTransfer.getData('teamId');
    const fromOffice=e.dataTransfer.getData('fromOffice');
    const empType=e.dataTransfer.getData('empType')||'all';
    setDragging(null);setDropTarget(null);
    if(!teamId||fromOffice===toOfficeId)return;
    const team=teams.find(t=>t.id===teamId);if(!team)return;
    const defaultSeats=empType==='all'
      ? (team.seats[viewMonth]||0)
      : ((team.byType||{})[empType]||[])[viewMonth]||0;
    setMoveSeats(String(defaultSeats));
    setPendingMove({teamId,fromOffice,toOffice:toOfficeId,empType});
  };
  const confirmMove=()=>{
    if(!pendingMove)return;
    const seats=parseInt(moveSeats)||0;
    if(seats<=0){showToast('人數必須 > 0','error');return;}
    const move={id:`m${Date.now()}`,teamId:pendingMove.teamId,toOffice:pendingMove.toOffice,empType:pendingMove.empType||'all',months:[...moveMonths],seats};
    const updated=scenarios.map(s=>s.id===activeScId?{...s,moves:[...s.moves,move]}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    const team=teams.find(t=>t.id===pendingMove.teamId);
    showToast(`✓ ${team?.dept} ${seats}人 → ${pendingMove.toOffice}`);
    logAction(`挪移：${team?.dept} ${seats}人 → ${pendingMove.toOffice}`);
    setPendingMove(null);setMoveSeats('');
  };
  const deleteMove=mvId=>{
    const updated=scenarios.map(s=>s.id===activeScId?{...s,moves:s.moves.filter(m=>m.id!==mvId)}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
  };
  const lockScenario=()=>{
    const updated=scenarios.map(s=>s.id===activeScId?{...s,locked:true}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    showToast('✓ 情境已暫存鎖定');
    logAction(`暫存鎖定：${activeSc?.name}`);
  };
  const unlockScenario=()=>{
    const updated=scenarios.map(s=>s.id===activeScId?{...s,locked:false}:s);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    showToast('🔓 情境已解鎖');
  };
  const addScenario=()=>{
    if(!scName.trim())return;
    const id=`sc${Date.now()}`;
    const sc={id,name:scName.trim(),createdBy:user.ini,createdAt:new Date().toISOString().slice(0,10),moves:[],locked:false};
    const updated=[...scenarios,sc];
    setScenarios(updated);LS.set('sf-scenarios',updated);
    setActiveScId(id);setAddingNew(false);setScName('');
    logAction(`建立情境：${sc.name}`);
  };
  const deleteScenario=id=>{
    const sc=scenarios.find(s=>s.id===id);
    if(sc?.locked){showToast('請先解鎖再刪除','error');return;}
    const updated=scenarios.filter(s=>s.id!==id);
    setScenarios(updated);LS.set('sf-scenarios',updated);
    if(activeScId===id)setActiveScId(null);
    showToast('情境已刪除');
  };
  const toggleMonth=mi=>setMoveMonths(p=>p.includes(mi)?p.filter(m=>m!==mi):[...p,mi]);
  const handleTopTableClick=(mi)=>{
    setViewMonth(mi);
    setMoveMonths(months.map((_,i)=>i).filter(i=>i>=mi));
  };
  const handleTopTableClick=(mi)=>{
    setViewMonth(mi);
    // Move months: from clicked month to end of year
    setMoveMonths(months.map((_,i)=>i).filter(i=>i>=mi));
  };
  // Write scenario result to a new Google Sheet tab
  const writeScenarioToSheet=async()=>{
    if(!sheetsToken){showToast('請先在「資料同步」頁連接 Google Sheet 並授權','error');return;}
    const cfg=LS.get('sf-sheets-cfg')||{};
    const sid=cfg.spreadsheetId||CONFIG.SPREADSHEET_ID;
    if(!sid){showToast('找不到 Spreadsheet ID，請先在資料同步頁設定','error');return;}
    const rawName=activeSc.name;
    const sheetName=rawName.slice(0,50).replace(/[^\u4e00-\u9fa5\w\s\-]/g,'_');
    const authHdr={'Content-Type':'application/json',Authorization:'Bearer '+sheetsToken};
    try{
      // Step 1: create new sheet tab
      showToast('建立分頁中...');
      const r1=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+':batchUpdate',
        {method:'POST',headers:authHdr,body:JSON.stringify({requests:[{addSheet:{properties:{title:sheetName}}}]})});
      const j1=await r1.json();
      if(!r1.ok){
        const msg=j1?.error?.message||'建立分頁失敗';
        if(msg.includes('already exists')){showToast('⚠ 同名分頁已存在，請先刪除','error');return;}
        throw new Error(msg);
      }

      // Step 2: build rows in SeatFlow_Teams format
      // Header: Dept. | Office | 3/30 Actual | Apr'26 | May'26 | ...
      const srcTeams=liveTeams||teams||TEAMS;
      const hdr=['Dept.','Office','3/30 Actual',...months];
      const allRows=[hdr];
      const EMP_ORDER=['Full-time','Contractor','Intern','Part-time','BPO'];

      srcTeams.forEach(t=>{
        // Compute effective seats per month after scenario moves
        const effSeats=months.map(function(_,mi){
          let s=t.seats[mi]||0;
          (activeSc.moves||[]).forEach(function(mv){
            if(mv.teamId===t.id&&mv.months.includes(mi))s=Math.max(0,s-mv.seats);
          });
          return s;
        });
        // TOTAL row
        allRows.push([t.dept,t.office,'',...effSeats]);
        // Employee type sub-rows
        const byType=t.byType||{};
        const typeKeys=EMP_ORDER.filter(et=>byType[et]&&byType[et].some(v=>v>0));
        typeKeys.forEach(function(et){
          const typeSeats=months.map(function(_,mi){
            const base=(byType[et]||[])[mi]||0;
            // Proportionally reduce if team is moved out
            const origTotal=t.seats[mi]||0;
            const effTotal=effSeats[mi];
            const ratio=origTotal>0?effTotal/origTotal:1;
            return Math.round(base*ratio);
          });
          allRows.push([et,'','',...typeSeats]);
        });
        allRows.push(Array(hdr.length).fill(''));// spacer
      });

      // Moves summary at bottom
      allRows.push(Array(hdr.length).fill(''));
      allRows.push(['=== 情境：'+rawName+' ===']);
      allRows.push(['部門','從辦公室','→至辦公室','人數','套用月份']);
      (activeSc.moves||[]).forEach(function(mv){
        const t2=srcTeams.find(function(t){return t.id===mv.teamId;});
        allRows.push([
          t2?t2.dept:'',
          officeNameById(t2?t2.office:''),
          officeNameById(mv.toOffice),
          mv.seats,
          mv.months.map(function(mi){return months[mi];}).join('、')
        ]);
      });

      // Step 3: write
      showToast('寫入資料中...');
      const range=encodeURIComponent(sheetName+'!A1');
      const r2=await fetch(
        'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+range+'?valueInputOption=USER_ENTERED',
        {method:'PUT',headers:authHdr,body:JSON.stringify({values:allRows})});
      const j2=await r2.json();
      if(!r2.ok)throw new Error(j2?.error?.message||'寫入資料失敗');
      showToast('✓ 已寫入「'+sheetName+'」（'+srcTeams.length+' 個部門）');
      logAction('採用情境並寫入 Sheet：'+rawName);
      setApplyModal(false);
    }catch(err){
      console.error('writeScenarioToSheet:',err);
      showToast('寫入失敗：'+err.message,'error');
    }
  };
  const applyBaseline=()=>{
    if(!activeSc)return;
    const lines=[`【情境採用】${activeSc.name}  ${new Date().toLocaleDateString('zh-TW')}`,`---`];
    activeSc.moves.forEach(mv=>{
      const team=teams.find(t=>t.id===mv.teamId);
      lines.push(`• ${team?.dept} ${mv.seats}人  ${team?.office} → ${officeNameById(mv.toOffice)}  月份：${mv.months.map(mi=>months[mi]).join('、')}`);
    });
    lines.push(`---\n請依上述更新 Google Sheet 後重新同步`);
    try{navigator.clipboard.writeText(lines.join('\n'));showToast('✓ 採用摘要已複製');}
    catch{showToast('請手動複製彈窗內容');}
    logAction(`採用情境：${activeSc.name}`);
    setApplyModal(false);
  };

  // ── remaining seat comparison table data ──────────────────────────────────
  const compData=useMemo(()=>offices.map(o=>({
    office:o,
    months:months.map((_,mi)=>({
      baseRemain: getMonthlyCap(o,mi)-calcOffice(o.id,mi,[],teams),
      baseActual: calcOffice(o.id,mi,[],teams),
      scRemain:   getMonthlyCap(o,mi)-calcOffice(o.id,mi,activeSc?.moves||[],teams),
      scActual:   calcOffice(o.id,mi,activeSc?.moves||[],teams),
    })),
  })),[activeSc,offices,months,teams]);
  // ── canvas: which teams are in each office this month ─────────────────────
  const canvasTeams=useMemo(()=>{
    const res={};allOffices.forEach(o=>{res[o.id]=[];});
    teams.forEach(t=>{
      if(res[t.office]!==undefined){
        let cur=t.seats[viewMonth]||0;
        let movedOut=0;
        (activeSc?.moves||[]).forEach(mv=>{
          if(mv.teamId!==t.id||!mv.months.includes(viewMonth))return;
          const s=Math.min(mv.seats,t.seats[viewMonth]||0);
          cur=Math.max(0,cur-s);movedOut+=s;
        });
        res[t.office].push({team:t,cur,movedOut});
      }
    });
    (activeSc?.moves||[]).forEach(mv=>{
      if(!mv.months.includes(viewMonth))return;
      const team=teams.find(t=>t.id===mv.teamId);if(!team)return;
      if(res[mv.toOffice]!==undefined){
        const existing=res[mv.toOffice].find(e=>e.team.id===mv.teamId);
        if(existing){existing.movedIn=(existing.movedIn||0)+mv.seats;existing.cur+=mv.seats;}
        else res[mv.toOffice].push({team,cur:mv.seats,movedOut:0,movedIn:mv.seats});
      }
    });
    return res;
  },[activeSc,viewMonth,teams,allOffices]);

  return(
    <div className="fu">
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">情境模擬工作台</div>
          <div className="ssub">
            {isLocked?<span style={{color:'#d97706'}}>🔒 已鎖定（唯讀）— 點解鎖後才能編輯</span>
              :<span>① 選/建立情境　② 拖曳團隊到目標辦公室　③ 設定人數與月份</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {activeSc&&!isLocked&&<button className="btn btn-ghost btn-sm" style={{borderColor:'#d97706',color:'#d97706'}} onClick={lockScenario}>💾 暫存鎖定</button>}
          {activeSc&&isLocked&&<button className="btn btn-ghost btn-sm" onClick={unlockScenario}>🔓 解鎖</button>}
          {activeSc&&<button className="btn btn-green btn-sm" onClick={()=>setApplyModal(true)}>✓ 確認採用</button>}
        </div>
      </div>

      {/* Scenario selector */}
      <div className="card" style={{padding:'10px 14px',marginBottom:12,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:'#374151',flexShrink:0}}>情境：</span>
        {scenarios.map(sc=>(
          <div key={sc.id} style={{display:'flex',alignItems:'center',gap:2}}>
            <button onClick={()=>setActiveScId(activeScId===sc.id?null:sc.id)}
              style={{padding:'4px 11px',borderRadius:'20px 0 0 20px',border:`1.5px solid ${activeScId===sc.id?'#1d4ed8':'#d1d5db'}`,borderRight:'none',background:activeScId===sc.id?'#eff6ff':'#fff',color:activeScId===sc.id?'#1d4ed8':'#374151',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit',display:'flex',alignItems:'center',gap:5}}>
              {sc.locked&&'🔒'}{sc.name} ({sc.moves.length})
            </button>
            <button onClick={()=>deleteScenario(sc.id)}
              style={{padding:'4px 8px',borderRadius:'0 20px 20px 0',border:`1.5px solid ${activeScId===sc.id?'#1d4ed8':'#d1d5db'}`,background:activeScId===sc.id?'#eff6ff':'#fff',color:'#9ca3af',cursor:'pointer',fontSize:12,fontFamily:'inherit',lineHeight:1}}>×</button>
          </div>
        ))}
        {addingNew?(
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input className="inp" style={{width:130,padding:'5px 9px'}} value={scName} onChange={e=>setScName(e.target.value)} placeholder="情境名稱" onKeyDown={e=>e.key==='Enter'&&addScenario()} autoFocus/>
            <button className="btn btn-primary btn-sm" onClick={addScenario}>建立</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setAddingNew(false)}>取消</button>
          </div>
        ):(
          <button className="btn btn-ghost btn-sm" onClick={()=>{setAddingNew(true);setScName('');}}>+ 新增情境</button>
        )}
      </div>

      {/* Remaining seats table — click month header to select */}
      <div className="card" style={{marginBottom:12,overflow:'hidden'}}>
        <div style={{padding:'10px 16px',borderBottom:'1px solid #e5e7eb',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontWeight:700,fontSize:12}}>各辦公室剩餘座位</span>
          {activeSc&&<span style={{fontSize:11,color:'#6b7280'}}>— 左：基準 ／ 右：模擬情境</span>}
          <span style={{fontSize:10,color:'#9ca3af',marginLeft:'auto'}}>點月份欄位切換畫布</span>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl" style={{minWidth:800}}>
            <thead><tr>
              <th style={{minWidth:80}}>辦公室</th><th style={{width:55,textAlign:'right'}}>容量</th>
              {months.map((m,mi)=>(
                <th key={mi} onClick={()=>handleTopTableClick(mi)}
                  style={{textAlign:'center',padding:'6px 3px',
                    minWidth:activeSc?90:60,cursor:'pointer',
                    background:viewMonth===mi?'#eff6ff':'transparent',
                    color:viewMonth===mi?'#1d4ed8':'inherit',
                    borderBottom:viewMonth===mi?'2px solid #1d4ed8':'none'}}>
                  {m}
                  {activeSc&&<div style={{display:'flex',gap:2,justifyContent:'center',marginTop:1,fontSize:8,color:viewMonth===mi?'#1d4ed8':'#9ca3af'}}><span>基準</span><span>情境</span></div>}
                </th>
              ))}
            </tr></thead>
            <tbody>
              {compData.map(({office:o,months:mdata})=>{
                const remainColor=r=>r<0?'#dc2626':r<20?'#d97706':r<60?'#059669':'#374151';
                const remainBg=r=>r<0?'#fef2f2':r<20?'#fffbeb':r<60?'#f0fdf4':'#f9fafb';
                return(
                  <tr key={o.id}>
                    <td style={{fontWeight:700,fontSize:12}}>{o.name}</td>
                    <td style={{textAlign:'right',color:'#6b7280',fontSize:11}}>{o.cap}</td>
                    {mdata.map(({baseRemain,baseActual,scRemain,scActual},mi)=>{
                      const delta=scActual-baseActual;
                      const hasDelta=activeSc&&delta!==0;
                      const isSelMonth=viewMonth===mi;
                      return(
                        <td key={mi} style={{padding:3,textAlign:'center',background:isSelMonth?'#f0f9ff':'transparent'}}>
                          {activeSc?(
                            <div style={{display:'flex',gap:2,justifyContent:'center'}}>
                              <div style={{background:remainBg(baseRemain),borderRadius:4,padding:'4px 4px',minWidth:36}}>
                                <div style={{fontSize:11,fontWeight:700,color:remainColor(baseRemain)}}>{baseRemain}</div>
                                <div style={{fontSize:8,color:'#9ca3af'}}>{baseActual}</div>
                              </div>
                              <div style={{background:remainBg(scRemain),borderRadius:4,padding:'4px 4px',minWidth:36,border:hasDelta?`1.5px solid ${delta>0?'#fecaca':'#bbf7d0'}`:'1px solid transparent'}}>
                                <div style={{fontSize:11,fontWeight:700,color:remainColor(scRemain)}}>{scRemain}</div>
                                {hasDelta&&<div style={{fontSize:8,color:delta>0?'#dc2626':'#059669',fontWeight:700}}>{delta>0?'▲':'▼'}{Math.abs(delta)}</div>}
                              </div>
                            </div>
                          ):(
                            <div style={{background:remainBg(baseRemain),borderRadius:4,padding:'4px 5px'}}>
                              <div style={{fontSize:12,fontWeight:700,color:remainColor(baseRemain)}}>{baseRemain}</div>
                              <div style={{fontSize:9,color:'#9ca3af'}}>{baseActual}人</div>
                            </div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Month controls */}
      <div className="card" style={{padding:'10px 14px',marginBottom:12,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#374151',flexShrink:0}}>畫布月份：</span>
          {months.map((m,mi)=>(
            <button key={mi} onClick={()=>setViewMonth(mi)}
              style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${viewMonth===mi?'#374151':'#d1d5db'}`,background:viewMonth===mi?'#111827':'#fff',color:viewMonth===mi?'#fff':'#374151',cursor:'pointer',fontSize:10,fontWeight:600,fontFamily:'inherit'}}>
              {m}
            </button>
          ))}
        </div>
        <div style={{width:1,height:20,background:'#e5e7eb'}}/>
        <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#1d4ed8',flexShrink:0}}>挪移月份（點上方選取或手動設定）：</span>
          {months.map((m,mi)=>{const s=moveMonths.includes(mi);return(
            <span key={mi} className="chip" onClick={()=>toggleMonth(mi)}
              style={{borderColor:s?'#1d4ed8':'#d1d5db',background:s?'#eff6ff':'#fff',color:s?'#1d4ed8':'#6b7280',fontSize:10}}>
              {m}
            </span>
          );})}
        </div>
      </div>

      {/* Main canvas */}
      <div style={{display:'flex',gap:12,alignItems:'flex-start',minHeight:320}}>
        {/* LEFT: team list */}
        <div style={{width:200,flexShrink:0,maxHeight:'68vh',overflowY:'auto'}}>
          {offices.map(o=>{
            const oTeams=teams.filter(t=>t.office===o.id&&(t.seats[viewMonth]||0)>0);
            if(!oTeams.length)return null;
            return(
              <div key={o.id} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:'#9ca3af',marginBottom:5,textTransform:'uppercase',display:'flex',alignItems:'center',gap:6}}>
                  <div style={{flex:1,height:1,background:'#e5e7eb'}}/>{o.name}<div style={{flex:1,height:1,background:'#e5e7eb'}}/>
                </div>
                {oTeams.map(team=>{
                  const seats=team.seats[viewMonth]||0;
                  const movedOut=(activeSc?.moves||[]).filter(mv=>mv.teamId===team.id&&mv.months.includes(viewMonth)).reduce((s,mv)=>s+mv.seats,0);
                  const remaining=Math.max(0,seats-movedOut);
                  const hasMoved=movedOut>0;
                  const byType=team.byType||{};
                  const hasTypes=Object.keys(byType).filter(et=>(byType[et][viewMonth]||0)>0).length>0;
                  const EMP_ST={'Full-time':{bg:'#dbeafe',txt:'#1d4ed8'},'Contractor':{bg:'#cffafe',txt:'#0e7490'},'Intern':{bg:'#d1fae5',txt:'#065f46'},'Part-time':{bg:'#d1fae5',txt:'#065f46'},'BPO':{bg:'#ede9fe',txt:'#5b21b6'}};
                  const movedByType={};
                  (activeSc?.moves||[]).filter(mv=>mv.teamId===team.id&&mv.months.includes(viewMonth)).forEach(mv=>{
                    const t=mv.empType||'all';movedByType[t]=(movedByType[t]||0)+mv.seats;
                  });
                  return(
                    <div key={team.id} style={{border:`1.5px solid ${hasMoved?'#fed7aa':'#e5e7eb'}`,borderRadius:9,background:hasMoved?'#fff7ed':'#fff',marginBottom:6,boxShadow:'0 1px 2px rgba(0,0,0,.04)',overflow:'hidden'}}>
                      <div draggable={!!canDragDrop}
                        onDragStart={e=>handleDragStart(e,team.id,team.office,'all')}
                        onDragEnd={()=>setDragging(null)}
                        style={{padding:'8px 11px',display:'flex',alignItems:'center',gap:5,cursor:canDragDrop?'grab':'default',borderBottom:hasTypes?'1px solid #f1f5f9':'none'}}>
                        <span style={{fontSize:13,color:'#9ca3af'}}>⠿</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:12,color:'#111827'}}>{team.dept}</div>
                          <div style={{fontSize:10,marginTop:1,color:'#6b7280'}}>
                            {hasMoved?<><span style={{color:'#dc2626',fontWeight:700}}>{remaining}</span><span style={{textDecoration:'line-through',marginLeft:4,color:'#9ca3af'}}>{seats}</span><span style={{color:'#9ca3af',marginLeft:4}}>移{movedOut}</span></>:<span>{seats} 人</span>}
                          </div>
                        </div>
                      </div>
                      {hasTypes&&['Full-time','Contractor','Intern','Part-time','BPO'].map(et=>{
                        const etVal=(byType[et]||[])[viewMonth]||0;if(etVal===0)return null;
                        const etMoved=movedByType[et]||0;
                        const etRem=Math.max(0,etVal-etMoved);
                        const allGone=etRem===0;
                        const ts=EMP_ST[et]||{bg:'#f3f4f6',txt:'#374151'};
                        const isDrg=dragging?.teamId===team.id&&dragging?.empType===et;
                        return(
                          <div key={et} draggable={!!canDragDrop&&!allGone}
                            onDragStart={e=>handleDragStart(e,team.id,team.office,et)}
                            onDragEnd={()=>setDragging(null)}
                            style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:isDrg?ts.bg:allGone?'#fafafa':'#fff',borderBottom:'1px solid #f9fafb',cursor:canDragDrop&&!allGone?'grab':'not-allowed',opacity:allGone?.4:isDrg?.4:1}}>
                            <div style={{width:7,height:7,borderRadius:'50%',background:allGone?'#d1d5db':ts.txt,flexShrink:0}}/>
                            <span style={{fontSize:10,fontWeight:600,color:allGone?'#9ca3af':ts.txt,flex:1}}>{et}</span>
                            {etMoved>0&&!allGone&&<span style={{fontSize:8,color:'#9ca3af',textDecoration:'line-through',marginRight:2}}>{etVal}</span>}
                            <span style={{fontSize:12,fontWeight:700,color:allGone?'#9ca3af':ts.txt}}>{allGone?'全移':etRem}</span>
                            {!allGone&&<span style={{fontSize:11,color:'#9ca3af'}}>⠿</span>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* RIGHT: office drop zones */}
        <div style={{flex:1,display:'flex',gap:8,overflowX:'auto',paddingBottom:4,alignItems:'flex-start'}}>
          {offices.map(o=>{
            const officeTeams=(canvasTeams[o.id]||[]).filter(t=>(t.cur||0)>0);
            const actual=calcOffice(o.id,viewMonth,activeSc?.moves||[],teams);
            const baseActual=calcOffice(o.id,viewMonth,[],teams);
            const mCap=getMonthlyCap(o,viewMonth);
            const remain=mCap-actual;
            const p=pct(actual,mCap);
            const s=statusOf(p);
            const isTarget=dropTarget===o.id;
            return(
              <div key={o.id} className={isTarget?'drag-over':''}
                onDragOver={e=>{e.preventDefault();setDropTarget(o.id);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDropTarget(null);}}
                onDrop={e=>handleDrop(e,o.id)}
                style={{minWidth:155,flex:1,border:`2px solid ${isTarget?'#1d4ed8':SC[s].border}`,borderRadius:10,background:isTarget?'#eff6ff':SC[s].bg,padding:9,transition:'all .15s'}}>
                <div style={{marginBottom:8,paddingBottom:7,borderBottom:`1px solid ${SC[s].border}`}}>
                  <div style={{fontWeight:700,fontSize:13}}>{o.name}</div>
                  <div style={{fontSize:10,color:'#6b7280'}}>容量 {mCap}</div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginTop:4}}>
                    <span style={{color:'#6b7280'}}>{actual} 人</span>
                    <span style={{fontWeight:700,color:remain<10?'#dc2626':remain<50?'#d97706':'#059669'}}>剩 {remain}</span>
                  </div>
                  <div style={{height:4,background:'rgba(0,0,0,.06)',borderRadius:3,marginTop:4}}>
                    <div style={{height:4,background:SC[s].bar,borderRadius:3,width:Math.min(p,100)+'%',transition:'width .3s'}}/>
                  </div>
                  {actual!==baseActual&&<div style={{fontSize:9,color:'#d97706',marginTop:3}}>⚡ 基準 {baseActual} → 模擬 {actual}</div>}
                </div>
                {officeTeams.length===0?(
                  <div style={{textAlign:'center',color:isTarget?'#1d4ed8':'#9ca3af',fontSize:11,padding:'16px 0'}}>{isTarget?'↓ 放開以移入':'（空）'}</div>
                ):officeTeams.map(({team,cur,movedOut,movedIn})=>(
                  <div key={team.id} draggable={!!canDragDrop}
                    onDragStart={e=>handleDragStart(e,team.id,o.id,'all')}
                    onDragEnd={()=>setDragging(null)}
                    style={{padding:'6px 9px',borderRadius:7,marginBottom:5,background:movedIn?'#eff6ff':movedOut?'#fff7ed':'#fff',border:`1px solid ${movedIn?'#bfdbfe':movedOut?'#fed7aa':'#e5e7eb'}`,cursor:canDragDrop?'grab':'default'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontWeight:700,fontSize:11}}>{team.dept}</span>
                      <div style={{display:'flex',gap:4,alignItems:'center'}}>
                        {movedIn&&<span style={{fontSize:9,background:'#dbeafe',color:'#1d4ed8',borderRadius:3,padding:'1px 4px'}}>↘{movedIn}</span>}
                        {movedOut&&<span style={{fontSize:9,background:'#fef3c7',color:'#92400e',borderRadius:3,padding:'1px 4px'}}>↗{movedOut}</span>}
                        <span style={{fontSize:11,color:'#9ca3af'}}>⠿</span>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:'#6b7280',marginTop:2}}>{cur} 人</div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>

      {/* Moves summary */}
      {activeSc&&activeSc.moves.length>0&&(
        <div className="card" style={{marginTop:12,padding:'10px 14px'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>挪移清單 ({activeSc.moves.length} 筆)</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {activeSc.moves.map(mv=>{
              const team=teams.find(t=>t.id===mv.teamId);
              const warns=(parseInt(mv.seats)||0)>0?moveMonths.map(mi=>({mi,available:team?.seats[mi]||0,ok:(parseInt(mv.seats)||0)<=(team?.seats[mi]||0)})):[];
              const hasWarn=warns.some(w=>!w.ok);
              return(
                <div key={mv.id} style={{display:'flex',alignItems:'center',gap:6,background:hasWarn?'#fffbeb':'#f8fafc',border:`1px solid ${hasWarn?'#fde68a':'#e5e7eb'}`,borderRadius:8,padding:'5px 10px',fontSize:11}}>
                  {hasWarn&&<span title="某月份可用人數不足">⚠</span>}
                  <span style={{fontWeight:700}}>{team?.dept}</span>
                  {mv.empType&&mv.empType!=='all'&&<span style={{fontSize:9,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe',borderRadius:3,padding:'1px 5px'}}>{mv.empType}</span>}
                  <span style={{color:'#6b7280'}}>{team?.office}</span>
                  <span>→</span>
                  <span style={{fontWeight:600,color:'#1d4ed8'}}>{officeNameById(mv.toOffice)}</span>
                  <span className="pill" style={{background:'#fef3c7',color:'#92400e'}}>{mv.seats}人</span>
                  <span style={{fontSize:9,color:'#9ca3af'}}>{mv.months.map(mi=>months[mi]).join('/')}</span>
                  <button onClick={()=>deleteMove(mv.id)} style={{background:'none',border:'none',color:'#9ca3af',cursor:'pointer',fontSize:14,lineHeight:1,fontFamily:'inherit'}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Pending move modal */}
      {pendingMove&&(()=>{
        const team=teams.find(t=>t.id===pendingMove.teamId);
        const seatsNum=parseInt(moveSeats)||0;
        const maxSeats=pendingMove.empType==='all'?(team?.seats[viewMonth]||0):((team?.byType||{})[pendingMove.empType]||[])[viewMonth]||0;
        const warns=seatsNum>0?moveMonths.map(mi=>{
          const available=pendingMove.empType==='all'?(team?.seats[mi]||0):((team?.byType||{})[pendingMove.empType]||[])[mi]||0;
          return{mi,available,ok:seatsNum<=available};
        }):[];
        const hasWarn=warns.some(w=>!w.ok);
        return(
          <Modal title="確認挪移" onClose={()=>setPendingMove(null)} width={440}>
            <div style={{padding:12,background:'#f8fafc',borderRadius:8,marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
                {team?.dept}
                {pendingMove.empType&&pendingMove.empType!=='all'&&(()=>{
                  const ts={'Full-time':{bg:'#dbeafe',txt:'#1d4ed8'},'Contractor':{bg:'#cffafe',txt:'#0e7490'},'Intern':{bg:'#d1fae5',txt:'#065f46'},'Part-time':{bg:'#d1fae5',txt:'#065f46'},'BPO':{bg:'#ede9fe',txt:'#5b21b6'}};
                  const s=ts[pendingMove.empType]||{bg:'#f3f4f6',txt:'#374151'};
                  return<span style={{fontSize:11,background:s.bg,color:s.txt,borderRadius:4,padding:'2px 8px',fontWeight:600}}>{pendingMove.empType}</span>;
                })()}
              </div>
              <div style={{fontSize:12,color:'#374151',display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:'#6b7280'}}>{officeNameById(pendingMove.fromOffice)}</span>
                <span style={{fontWeight:700,color:'#1d4ed8',fontSize:16}}>→</span>
                <span style={{fontWeight:700,color:'#1d4ed8'}}>{officeNameById(pendingMove.toOffice)}</span>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <label className="lbl">挪移人數（{months[viewMonth]} 可用 {maxSeats}）</label>
              <input type="number" className="inp" min={1} value={moveSeats} onChange={e=>setMoveSeats(e.target.value)} autoFocus/>
            </div>
            {seatsNum>0&&warns.length>0&&(
              <div style={{marginBottom:14}}>
                <label className="lbl">各月份影響</label>
                <div style={{border:'1px solid #e5e7eb',borderRadius:7,overflow:'hidden'}}>
                  <div style={{display:'grid',gridTemplateColumns:'50px 60px 60px 60px',background:'#f8fafc',padding:'5px 10px',fontSize:10,fontWeight:700,color:'#6b7280',gap:8}}>
                    <span>月份</span><span style={{textAlign:'right'}}>可用</span><span style={{textAlign:'right'}}>挪移</span><span style={{textAlign:'right'}}>剩餘</span>
                  </div>
                  {warns.map(({mi,available,ok})=>(
                    <div key={mi} style={{display:'grid',gridTemplateColumns:'50px 60px 60px 60px',padding:'5px 10px',fontSize:11,gap:8,borderTop:'1px solid #f3f4f6',background:ok?'#fff':'#fefce8'}}>
                      <span style={{fontWeight:600}}>{months[mi]}</span>
                      <span style={{textAlign:'right',color:'#6b7280'}}>{available}</span>
                      <span style={{textAlign:'right',fontWeight:600,color:ok?'#374151':'#dc2626'}}>{seatsNum}</span>
                      <span style={{textAlign:'right',fontWeight:700,color:ok?'#059669':'#d97706'}}>{available-Math.min(seatsNum,available)}</span>
                    </div>
                  ))}
                </div>
                {hasWarn&&<div style={{fontSize:10,color:'#92400e',marginTop:4,background:'#fffbeb',border:'1px solid #fde68a',borderRadius:5,padding:'5px 8px'}}>⚠ 部分月份人數不足，系統將以可用數為上限</div>}
              </div>
            )}
            <div style={{marginBottom:16}}>
              <label className="lbl">套用月份</label>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {months.map((m,mi)=>{const s=moveMonths.includes(mi);return(
                  <span key={mi} className="chip" onClick={()=>toggleMonth(mi)} style={{borderColor:s?'#1d4ed8':'#d1d5db',background:s?'#eff6ff':'#fff',color:s?'#1d4ed8':'#6b7280',fontSize:10}}>{m}</span>
                );})}
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setPendingMove(null)}>取消</button>
              <button className="btn btn-primary" onClick={confirmMove}>確認</button>
            </div>
          </Modal>
        );
      })()}

      {/* Apply modal */}
      {applyModal&&activeSc&&(
        <Modal title="確認採用情境" onClose={()=>setApplyModal(false)} width={480}>
          <div style={{padding:12,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,marginBottom:16,fontSize:12,color:'#166534'}}>
            <strong>📊 寫入 Google Sheet</strong>：自動建立以情境名稱命名的新分頁，將套用挪移後的資料寫入。<br/>
            <strong>📋 複製摘要</strong>：複製文字摘要，手動更新 Sheet。
          </div>
          {activeSc.moves.map(mv=>{
            const team=teams.find(t=>t.id===mv.teamId);
            return(
              <div key={mv.id} style={{display:'flex',gap:8,fontSize:12,marginBottom:8,alignItems:'center'}}>
                <span style={{fontWeight:600}}>{team?.dept}</span>
                <span>{mv.seats}人</span>
                <span style={{color:'#6b7280'}}>{team?.office}</span>
                <span>→</span>
                <span style={{color:'#1d4ed8',fontWeight:600}}>{officeNameById(mv.toOffice)}</span>
                <span style={{color:'#9ca3af',fontSize:10}}>{mv.months.map(mi=>months[mi]).join('、')}</span>
              </div>
            );
          })}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16,flexWrap:'wrap'}}>
            <button className="btn btn-ghost" onClick={()=>setApplyModal(false)}>取消</button>
            <button className="btn btn-ghost" onClick={applyBaseline}>📋 複製摘要</button>
            <button className="btn btn-green" onClick={writeScenarioToSheet}>
              📊 {sheetsToken?'寫入 Google Sheet 新分頁':'需先連接 Sheet'}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function DataSync({showToast,user,logAction,liveTeams,setLiveTeams,liveOffices,setLiveOffices,liveMonths,setLiveMonths,onTokenReady}){
  const [status,setStatus]=useState(()=>liveTeams?'connected':'idle');
  const [lastSync,setLastSync]=useState(null);
  const [previewRows,setPreviewRows]=useState([]);
  const [sheetMsg,setSheetMsg]=useState('');
  const [showSetup,setShowSetup]=useState(false);
  const [localCfg,setLocalCfg]=useState(()=>LS.get('sf-sheets-cfg')||{clientId:CONFIG.CLIENT_ID,spreadsheetId:CONFIG.SPREADSHEET_ID,sheetName:'SeatFlow_Teams',domain:CONFIG.ALLOWED_DOMAIN,capSheetName:''});
  const saveCfg=c=>{setLocalCfg(c);LS.set('sf-sheets-cfg',c);};

  const doFetch=async(token)=>{
    if(onTokenReady)onTokenReady(token);
    setStatus('connecting');setSheetMsg('讀取試算表中...');
    try{
      const sid=localCfg.spreadsheetId||CONFIG.SPREADSHEET_ID;
      const sname=localCfg.sheetName||'SeatFlow_Teams';
      try{
        const capRows=await fetchRange(token,localCfg.capSheetName||CONFIG.SHEET_CAP||'SeatFlow_Capacity',sid);
        if(capRows&&capRows.length>=2){
          const parsedCap=parseCapacitySheet(capRows);
          if(parsedCap&&parsedCap.length){
            setLiveOffices(parsedCap);LS.set('sf-live-offices',parsedCap);
            const capMonths=parsedCap[0]?.monthLabels;
            if(capMonths&&capMonths.length){setLiveMonths(capMonths);LS.set('sf-live-months',capMonths);}
          }
        }
      }catch(e){}
      const rows=await fetchRange(token,sname,sid);
      if(rows.length<2){setSheetMsg('資料為空，請確認工作表名稱');setStatus('error');return;}
      setPreviewRows(rows.slice(0,5));
      const parsed=parseTeamsSheet(rows);
      if(!parsed||!parsed.length){setSheetMsg('解析失敗，請確認欄位格式');setStatus('error');return;}
      setLiveTeams(parsed);LS.set('sf-live-teams',parsed);
      const firstWithMonths=parsed.find(t=>t.monthLabels&&t.monthLabels.length);
      if(firstWithMonths){setLiveMonths(firstWithMonths.monthLabels);LS.set('sf-live-months',firstWithMonths.monthLabels);}
      setStatus('connected');setLastSync(new Date().toLocaleString('zh-TW'));
      setSheetMsg('✓ 成功讀取 '+(rows.length-1)+' 筆，已套用至儀表板');
      showToast('✓ Google Sheet 同步完成（'+(rows.length-1)+' 筆資料）');
      try{
        const nRows=await fetchRange(token,'SeatFlow_Notes',sid);
        if(nRows&&nRows.length>1){const m={};nRows.slice(1).forEach(r=>{if(r[0]&&r[1])m[r[0]]=r[1];});LS.set('sf-notes',m);}
      }catch(e){}
    }catch(e){setStatus('error');setSheetMsg('錯誤：'+e.message);showToast(e.message,'error');}
  };

  const handleConnect=()=>{
    const cid=localCfg.clientId||CONFIG.CLIENT_ID;
    if(!cid||!(localCfg.spreadsheetId||CONFIG.SPREADSHEET_ID)){setShowSetup(true);setSheetMsg('請先填入 Client ID 與 Spreadsheet ID');return;}
    if(window.google?.accounts?.oauth2){
      const tc=window.google.accounts.oauth2.initTokenClient({
        client_id:cid,scope:'https://www.googleapis.com/auth/spreadsheets',
        callback:r=>{if(r.error){setStatus('error');setSheetMsg('授權失敗：'+r.error);return;}doFetch(r.access_token);}
      });
      tc.requestAccessToken();
    }else{setStatus('connecting');setTimeout(()=>{setStatus('error');setSheetMsg('Google API 未載入');},1000);}
  };
  const disconnect=()=>{setStatus('idle');setPreviewRows([]);setLastSync(null);setSheetMsg('');setLiveTeams(null);setLiveMonths(null);LS.del('sf-live-teams');LS.del('sf-live-offices');LS.del('sf-live-months');};

  return(
    <div className="fu">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <div className="stitle">Google Sheet 資料同步</div>
          <div className="ssub">連接後，儀表板座位數據將直接從你的 Google Sheet 讀取</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowSetup(!showSetup)}>⚙ 連線設定</button>
      </div>
      {showSetup&&(
        <div className="card fu" style={{padding:'18px 20px',marginBottom:14,border:'1px solid #bfdbfe',background:'#eff6ff'}}>
          <div style={{fontWeight:700,fontSize:13,color:'#1e40af',marginBottom:12}}>連線設定</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div><label className="lbl">OAuth 2.0 Client ID</label><input className="inp" value={localCfg.clientId||''} onChange={e=>saveCfg({...localCfg,clientId:e.target.value})} placeholder="xxxx.apps.googleusercontent.com"/></div>
            <div><label className="lbl">限定登入網域</label><input className="inp" value={localCfg.domain||''} onChange={e=>saveCfg({...localCfg,domain:e.target.value})} placeholder="yourcompany.com"/></div>
            <div><label className="lbl">Spreadsheet ID</label><input className="inp" value={localCfg.spreadsheetId||''} onChange={e=>saveCfg({...localCfg,spreadsheetId:e.target.value})} placeholder="從 Sheet URL 的 /d/XXXXX/edit 複製"/></div>
            <div><label className="lbl">團隊資料工作表</label><input className="inp" value={localCfg.sheetName||'SeatFlow_Teams'} onChange={e=>saveCfg({...localCfg,sheetName:e.target.value})} placeholder="SeatFlow_Teams"/></div>
            <div><label className="lbl">容量設定工作表（選填）</label><input className="inp" value={localCfg.capSheetName||''} onChange={e=>saveCfg({...localCfg,capSheetName:e.target.value})} placeholder="SeatFlow_Capacity"/></div>
          </div>
          <div style={{background:'#1e293b',borderRadius:7,padding:12,fontFamily:'monospace',fontSize:10,color:'#94a3b8',lineHeight:1.8}}>
            <div style={{color:'#7dd3fc',marginBottom:2}}>// 支援兩種分頁格式（二選一）：</div>
            <div style={{color:'#e2e8f0'}}>格式 A（推薦）— SeatFlow_Teams 分頁<br/>{"  "}Dept. | Office | 3/30 Actual | Apr | May | … | Dec<br/>{"  "}每個部門有 TOTAL 列 + Full-time / Contractor / Intern / BPO 子列</div>
            <div style={{color:'#94a3b8',marginTop:6}}>格式 B — SeatFlow_Teams_API<br/>{"  "}dept | office | emp_type | Apr | May | … | Dec</div>
            <div style={{color:'#7dd3fc',marginTop:6}}>// SeatFlow_Capacity 分頁（選填）：</div>
            <div style={{color:'#e2e8f0'}}>office_id | name | Apr | May | … | Dec<br/>{"  "}空白格 = 繼承上個月容量</div>
          </div>
        </div>
      )}
      {liveOffices&&(
        <div className="card" style={{padding:'12px 18px',marginBottom:12,border:'1px solid #bbf7d0',background:'#f0fdf4'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div>
              <span style={{fontWeight:700,fontSize:12,color:'#166534'}}>✓ 已讀取辦公室容量</span>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:4}}>
                {liveOffices.map(o=>(
                  <span key={o.id} style={{fontSize:11,background:'#fff',border:`1px solid ${o.cap<10?'#fca5a5':'#d1d5db'}`,borderRadius:6,padding:'3px 10px'}}>
                    <span style={{fontWeight:600}}>{o.name}</span>
                    <span style={{color:o.cap<10?'#dc2626':'#6b7280',marginLeft:4}}>{o.cap} seats{o.cap<10?' ⚠':''}</span>
                  </span>
                ))}
              </div>
            </div>
            <button onClick={()=>{setLiveOffices(null);setLiveMonths(null);LS.del('sf-live-offices');LS.del('sf-live-months');}} className="btn btn-ghost btn-sm">重置並重新同步</button>
          </div>
        </div>
      )}
      <div className="card" style={{padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>
              {status==='connected'?<span style={{color:'#059669'}}>● 已連線</span>
               :status==='connecting'?<span style={{color:'#d97706'}}>◉ 連線中...</span>
               :status==='error'?<span style={{color:'#dc2626'}}>✕ 失敗</span>
               :<span style={{color:'#9ca3af'}}>○ 尚未連線</span>}
            </div>
            {sheetMsg&&<div style={{fontSize:11,color:status==='error'?'#dc2626':'#059669'}}>{sheetMsg}</div>}
            {lastSync&&<div style={{fontSize:10,color:'#9ca3af',marginTop:2}}>最後同步：{lastSync}</div>}
          </div>
          {status!=='connected'
            ?<button className="btn btn-primary" onClick={handleConnect} disabled={status==='connecting'}>
              🔗 {status==='connecting'?'連線中...':'連接 Google Sheet'}
            </button>
            :<div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={handleConnect}>↻ 重新同步</button>
              <button className="btn btn-ghost btn-sm" onClick={disconnect}>中斷</button>
            </div>}
        </div>
      </div>
      {previewRows.length>0&&(
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid #e5e7eb',fontWeight:700,fontSize:12}}>資料預覽</div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>{(previewRows[0]||[]).map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
              <tbody>{previewRows.slice(1).map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody>
            </table>
          </div>
        </div>
      )}
      {status!=='connected'&&!previewRows.length&&(
        <div style={{textAlign:'center',color:'#9ca3af',padding:'40px 20px'}}>
          <div style={{fontSize:30,marginBottom:8}}>📊</div>
          <div style={{fontWeight:600,marginBottom:4}}>尚未連接 Google Sheet</div>
          <div style={{fontSize:11}}>目前使用內建示範資料。連接後將以 Sheet 資料為準。</div>
        </div>
      )}
    </div>
  );
}


function App(){
  const [user,setUser]=useState(()=>LS.get('sf-user'));
  const [tab,setTab]=useState('dashboard');
  const [scenarios,setScenarios]=useState(()=>LS.get('sf-scenarios')||[
    {id:'sc0',name:'HOS 滿載模擬',createdBy:'AC',createdAt:'2026-04-20',moves:[{id:'m0',teamId:'t4',toOffice:'UDN',months:[0,1,2],seats:80}]}
  ]);
  const [activeScId,setActiveScId]=useState(null);
  const [gw,setGw]=useState(null);   // reserved for future weight simulation
  const [liveTeams,setLiveTeams]=useState(()=>{
    const t=LS.get('sf-live-teams');
    // Invalidate old format (teams without monthLabels or with wrong structure)
    if(t&&Array.isArray(t)){
      const valid=t.every(x=>x.dept&&x.office&&Array.isArray(x.seats));
      if(!valid){LS.del('sf-live-teams');return null;}
    }
    return t||null;
  });
  const [liveOffices,setLiveOffices]=useState(()=>{
    const cached=LS.get('sf-live-offices');
    // Invalidate old cache: valid offices should have monthlyCaps array
    if(cached&&Array.isArray(cached)){
      const isValid=cached.every(o=>Array.isArray(o.monthlyCaps)&&o.monthlyCaps.length>0);
      if(!isValid){LS.del('sf-live-offices');return null;}
    }
    return cached||null;
  });
  const [liveMonths,setLiveMonths]=useState(()=>LS.get('sf-live-months')||null);
  const [toast,setToast]=useState(null);
  const [sheetsToken,setSheetsToken]=useState(null);


  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  const logAction=()=>{}; // removed
  const handleLogin=u=>{setUser(u);LS.set('sf-user',u);logAction('使用者登入','sync');};
  const handleLogout=()=>{setUser(null);LS.del('sf-user');};

  const activeSc=scenarios.find(s=>s.id===activeScId);
  const activeScMoves=activeSc?.moves||[];

  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  const NAV=[
    {key:'dashboard',label:'📊 總覽'},
    {key:'scenario', label:'🔀 情境模擬'},
    {key:'data',     label:'📊 資料同步'},
  ];

  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      {/* Header */}
      <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',height:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{fontWeight:800,fontSize:14,letterSpacing:'-0.5px',color:'#111827',flexShrink:0}}>
            SeatFlow <span style={{fontSize:10,background:'#1d4ed8',color:'#fff',borderRadius:3,padding:'1px 6px',fontWeight:700}}>Enterprise</span>
          </div>
          <nav style={{display:'flex',gap:1}}>
            {NAV.map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)}
                style={{padding:'5px 13px',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:tab===t.key?700:400,background:tab===t.key?'#eff6ff':'transparent',color:tab===t.key?'#1d4ed8':'#6b7280',whiteSpace:'nowrap'}}>
                {t.label}
              </button>
            ))}
          </nav>
          {activeSc&&(
            <div style={{display:'flex',alignItems:'center',gap:7,padding:'3px 10px',background:'#fefce8',border:'1px solid #fde047',borderRadius:20,fontSize:11,fontWeight:600,color:'#92400e'}}>
              ⚡ {activeSc.name}
              <button onClick={()=>setActiveScId(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#92400e',fontSize:13,padding:0,lineHeight:1,fontFamily:'inherit'}}>×</button>
            </div>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Avatar ini={user.ini} size={28}/>
          <span style={{fontSize:12,color:'#374151',fontWeight:500}}>{user.name}</span>
          <button onClick={handleLogout} className="btn btn-ghost btn-sm">登出</button>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:'18px 20px',maxWidth:1500,margin:'0 auto'}}>
        {tab==='dashboard'&&<Dashboard moves={activeScMoves} activeScenario={activeSc} liveOffices={liveOffices} liveMonths={liveMonths} liveTeams={liveTeams}/>
        {tab==='scenario'&&<ScenarioBuilder scenarios={scenarios} setScenarios={setScenarios} activeScId={activeScId} setActiveScId={setActiveScId} showToast={showToast} logAction={logAction} user={user} liveOffices={liveOffices} liveMonths={liveMonths} sheetsToken={sheetsToken} liveTeams={liveTeams}/>}
        {tab==='data'&&<DataSync showToast={showToast} user={user} logAction={logAction} liveTeams={liveTeams} setLiveTeams={setLiveTeams} liveOffices={liveOffices} setLiveOffices={setLiveOffices} liveMonths={liveMonths} setLiveMonths={setLiveMonths} onTokenReady={t=>setSheetsToken(t)}/>}

      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:13px;color:#111827}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;line-height:1.2;white-space:nowrap}
.btn-primary{background:#1d4ed8;color:#fff}.btn-primary:hover{background:#1e40af}
.btn-ghost{background:transparent;color:#374151;border:1px solid #d1d5db}.btn-ghost:hover{background:#f9fafb}
.btn-danger{background:#fff;color:#dc2626;border:1px solid #fca5a5}.btn-danger:hover{background:#fef2f2}
.btn-green{background:#059669;color:#fff}.btn-green:hover{background:#047857}
.btn-sm{padding:4px 10px;font-size:11px}
.inp{padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;width:100%;background:#fff;transition:border .15s}
.inp:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.sel{padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;background:#fff;cursor:pointer}
.sel:focus{border-color:#1d4ed8}
.lbl{font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 12px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;text-align:left;background:#f8fafc;border-bottom:2px solid #e5e7eb;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:12px}
.tbl tbody tr:hover td{background:#fafafa}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;user-select:none}
.stitle{font-size:15px;font-weight:700;color:#111827}
.ssub{font-size:12px;color:#6b7280;margin-top:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .2s ease}
@keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sr{animation:slideR .22s ease}
.drag-over{outline:2px dashed #1d4ed8!important;background:#eff6ff!important}
.dragging{opacity:.4;cursor:grabbing}
.team-card{cursor:grab;user-select:none;transition:all .15s}
.team-card:active{cursor:grabbing}
input[type=range]{accent-color:#1d4ed8;cursor:pointer}
</style>
</head>
<body><div id="root"></div>

</body>
