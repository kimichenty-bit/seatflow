// ── Google Sheets loader ──────────────────────────────────────────────────────
async function fetchRange(token, sheetName, spreadsheetId, range='A1:Z200') {
  const sid=spreadsheetId||CONFIG.SPREADSHEET_ID;
  const r = encodeURIComponent(`${sheetName}!${range}`);
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${r}`,
    {headers:{Authorization:`Bearer ${token}`}}
  );
  if(!res.ok) throw new Error(`Sheets API 錯誤 (${res.status})`);
  const d = await res.json();
  return d.values || [];
}
// Parse Capacity sheet: office_id | name | capacity | Apr | May...
// Parse Teams sheet:    team_id | dept | office | Apr | May | Jun | ... | Dec
// ── Dynamic month detection ─────────────────────────────────────────────────
// Returns [{col, label}] for all month-like headers found in a header row
// label = cleaned display string e.g. "Mar'26", "Apr'26"
function detectMonthCols(hdr){
  const MNAMES=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const found=[];
  hdr.forEach((h,ci)=>{
    if(!h)return;
    const s=String(h).toLowerCase();
    let mi=-1, yr='';
    // Try month name match first (e.g. "Apr'26", "March 2026")
    const nameMatch=MNAMES.findIndex(m=>s.includes(m));
    if(nameMatch>=0){
      mi=nameMatch;
      const yearM=s.match(/\d{2,4}/);
      yr=yearM?yearM[0].slice(-2):'';
    } else {
      // Try ISO date format YYYY-MM-DD or YYYY/MM/DD
      const isoM=s.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
      if(isoM){
        mi=parseInt(isoM[2])-1; // 0-indexed month
        yr=isoM[1].slice(-2);
      }
      // Try M/D/YYYY format
      const usM=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(usM){
        mi=parseInt(usM[1])-1;
        yr=usM[3].slice(-2);
      }
    }
    if(mi<0||mi>11)return;
    const label=MNAMES[mi].charAt(0).toUpperCase()+MNAMES[mi].slice(1)+(yr?"'"+yr:'');
    found.push({col:ci, label, monthOrder:mi+(yr?parseInt(yr)*12:0)});
  });
  return found.sort((a,b)=>a.col-b.col);
}

function parseCapacitySheet(rows){
  // Format: office_id | name | <any months> e.g. Mar'26 Apr'26 ... Dec'26
  // Blank cell = inherit previous month's value
  // Numbers may contain comma thousands separators (e.g. "1,106")
  if(!rows.length)return null;
  const hdr=rows[0];
  const parseNum=v=>{
    if(v===null||v===undefined||v==='')return null;
    const n=parseInt(String(v).replace(/,/g,''));
    return isNaN(n)?null:n;
  };
  const mCols=detectMonthCols(hdr); // all month columns, in order
  if(!mCols.length)return null;
  const monthLabels=mCols.map(m=>m.label);
  return rows.slice(1).filter(r=>r[0]&&!String(r[0]).startsWith('/')).map(r=>{
    const id=String(r[0]).trim();
    const name=String(r[1]||r[0]).trim();
    const monthlyCaps=[];
    let lastVal=0;
    mCols.forEach(({col})=>{
      const v=parseNum(r[col]);
      if(v!==null)lastVal=v;
      monthlyCaps.push(lastVal);
    });
    const cap=Math.max(...monthlyCaps,0);
    return{id,name,cap,monthlyCaps,monthLabels,floors:[]};
  });
}
function parseTeamsSheet(rows){
  if(!rows.length)return null;
  const hdr=rows[0];
  // Detect all month columns dynamically
  const mCols=detectMonthCols(hdr);
  if(!mCols.length)return null;
  const monthLabels=mCols.map(m=>m.label);
  const readSeats=r=>mCols.map(({col})=>{
    const v=parseInt(String(r[col]||'').replace(/,/g,''));
    return isNaN(v)?0:v;
  });

  const hasEmpType=hdr.some(h=>h&&String(h).toLowerCase().includes('emp_type'));
  const isDeptFormat=!hasEmpType&&(String(hdr[0]||'').toLowerCase().includes('dept')||String(hdr[1]||'').toLowerCase().includes('office'));

  // ── Format A: SeatFlow_Teams_API (with emp_type col) ──────────────────────
  // team_id | dept | office | emp_type | Apr ... Dec  (team_id optional)
  if(hasEmpType){
    const groups={};
    rows.slice(1).filter(r=>r[1]&&r[2]).forEach(r=>{
      const dept=String(r[1]).trim(), office=String(r[2]).trim();
      const empType=String(r[3]||'').trim();
      const key=`${dept}||${office}`;
      if(!groups[key]) groups[key]={dept,office,seats:null,byType:{}};
      const vals=readSeats(r);
      if(empType==='TOTAL') groups[key].seats=vals;
      else if(empType) groups[key].byType[empType]=vals;
    });
    return Object.values(groups).filter(g=>g.seats).map((g,i)=>({
      id:`t${i}`, dept:g.dept, office:g.office, seats:g.seats, byType:g.byType||{}, monthLabels:g.monthLabels||monthLabels,
    }));
  }

  // ── Format B: SeatFlow_Teams (human view, dept only on TOTAL row) ─────────
  // Dept. | Office | 3/30 Actual | Apr'26 ... Dec'26
  // TOTAL row: col0=dept, col1=office, col2=3/30, col3..=months
  // Type rows: col0=Full-time/Contractor/Intern/BPO, col1=office, col2=blank, col3..=months
  if(isDeptFormat){
    // Identify emp sub-type rows by keyword match + learned pattern.
    // Strategy: once a col0 label appears as a sub-row after a known dept,
    // remember it as a sub-type label for the rest of the sheet.
    const EMP_KEYWORDS=['full-time','contractor','intern','part-time','bpo','派遣','外包','菲律賓'];
    const learnedSubTypes=new Set();
    const isEmpType=v=>{
      if(!v)return false;
      const vl=v.toLowerCase();
      if(EMP_KEYWORDS.some(k=>vl.includes(k)))return true;
      return learnedSubTypes.has(v);
    };
    const groups={};
    let currentKey=null;
    rows.slice(1).forEach(r=>{
      if(!r||r.every(v=>v===null||v===undefined||v===''))return;
      const col0=String(r[0]||'').trim();
      const col1=String(r[1]||'').trim();
      if(!col0)return;
      if(!isEmpType(col0)){
        // TOTAL row
        const key=col0+'||'+col1;
        currentKey=key;
        if(!groups[key])groups[key]={dept:col0,office:col1,seats:null,byType:{}};
        // Only capture seats ONCE — the very first (total) row per dept+office
        if(!groups[key].seats){groups[key].seats=readSeats(r);groups[key].monthLabels=monthLabels;}
      } else{
        // Sub-type row — learn this label, add to byType
        learnedSubTypes.add(col0);
        if(currentKey)groups[currentKey].byType[col0]=readSeats(r);
      }
    });
    return Object.values(groups).filter(g=>g.seats).map((g,i)=>({
      id:`t${i}`, dept:g.dept, office:g.office, seats:g.seats, byType:g.byType||{}, monthLabels:g.monthLabels||monthLabels,
    }));
  }

  // ── Format C: Simple (team_id | dept | office | Apr ... Dec) ──────────────
  return rows.slice(1).filter(r=>r[1]&&r[2]).map((r,i)=>({
    id:r[0]||`t${i}`,
    dept:String(r[1]||'').trim(),
    office:String(r[2]||'').trim(),
    seats:readSeats(r),monthLabels,
    byType:{},
  })).filter(t=>t.dept&&t.office);
}

// ── CALCULATION ENGINE (headcount only) ───────────────────────────────────────
const pct=(u,c)=>c>0?Math.round(u/c*100):0;
const statusOf=p=>p>=95?'danger':p>=80?'warn':p>0?'ok':'empty';
const SC={
  danger:{bg:'#fef2f2',txt:'#b91c1c',bar:'#ef4444',border:'#fecaca'},
  warn:  {bg:'#fffbeb',txt:'#92400e',bar:'#f59e0b',border:'#fde68a'},
  ok:    {bg:'#f0fdf4',txt:'#166534',bar:'#22c55e',border:'#bbf7d0'},
  empty: {bg:'#f9fafb',txt:'#9ca3af',bar:'#e5e7eb',border:'#f3f4f6'},
};
function calcOffice(officeId, mi, moves, teamsData){
  const td=teamsData||TEAMS;
  const activeTeams=td.filter(t=>t.office===officeId);
  let actual=activeTeams.reduce((s,t)=>s+(t.seats[mi]||0),0);
  (moves||[]).forEach(mv=>{
    if(!mv.months.includes(mi))return;
    const team=td.find(t=>t.id===mv.teamId);
    if(!team)return;
    if(team.office===officeId) actual=Math.max(0,actual-mv.seats);
    if(mv.toOffice===officeId)  actual+=mv.seats;
  });
  return actual;
}
function getMonthlyCap(office, mi){
  // Use monthlyCaps array if available (from Sheet), else flat cap
  if(office.monthlyCaps&&office.monthlyCaps[mi]!==undefined) return office.monthlyCaps[mi];
  return office.cap||0;
}
